name: CI

on:
  push:
    branches: [main]
  pull_request:

# One bash shell on both OSes -> consistent, fail-fast (set -eo pipefail) steps.
defaults:
  run:
    shell: bash

jobs:
  build-and-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      # WO v4.34.4 §3.1 — CI runs against the ISOLATED test DB (icb_test), same as local dev. The
      # db-name guard (app/db_guard.py) refuses any destructive op unless DATABASE_URL ends in `_test`.
      DATABASE_URL: postgresql+psycopg://icb_app:icb_app_dev@localhost:5432/icb_test
      SESSION_SECRET: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v5

      # PostgreSQL 16 on Linux AND Windows runners (early cross-OS warning).
      - name: Set up PostgreSQL
        id: postgres
        uses: ikalnytskyi/action-setup-postgres@v6
        with:
          username: postgres
          password: postgres
          port: 5432

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      # pycairo (pulled transitively by svglib -> rlPyCairo) ships no Linux wheel;
      # building it from sdist needs the cairo dev headers + pkg-config. Windows
      # uses a prebuilt wheel, so this is Linux-only. Pre-existing CI break (red on
      # every run since v4.13); fixed here per the "build CI now" decision (WO v4.15).
      - name: Install system libs for pycairo (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Bootstrap database (deploy/postgres/init.sql)
        run: psql "${{ steps.postgres.outputs.connection-uri }}" -f deploy/postgres/init.sql

      # WO v4.34.4 §3.1 — create the isolated test DB the suite + seed run against (CI's DATABASE_URL
      # points at icb_test; the db-name guard refuses anything else).
      - name: Bootstrap isolated test database (deploy/postgres/init_test.sql)
        run: psql "${{ steps.postgres.outputs.connection-uri }}" -f deploy/postgres/init_test.sql

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Alembic round-trip (upgrade / downgrade / upgrade)
        working-directory: backend
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Seed mockup data into icb_mes
        run: python -m backend.scripts.seed_from_mockup --reset

      - name: Backend tests
        working-directory: backend
        run: pytest --ignore=tests/journeys

      # WO v4.26.1 — end-to-end journey tests (Playwright). The _common.py session fixture
      # boots uvicorn (serving the built dist against the seeded DB) and tears it down, so this
      # step just installs the browser and runs pytest. Runs on Linux + Windows; a failing
      # journey blocks the merge (§0.6).
      - name: Journey tests (Playwright)
        working-directory: backend
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            python -m playwright install --with-deps chromium
          else
            python -m playwright install chromium
          fi
          pytest tests/journeys/ -v
