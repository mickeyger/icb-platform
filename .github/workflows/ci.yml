name: CI

on:
  push:
    branches: [main]
  pull_request:

# One bash shell on both OSes -> consistent, fail-fast (set -eo pipefail) steps.
defaults:
  run:
    shell: bash

jobs:
  build-and-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      DATABASE_URL: postgresql+psycopg://icb_app:icb_app_dev@localhost:5432/icb
      SESSION_SECRET: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4

      # PostgreSQL 16 on Linux AND Windows runners (early cross-OS warning).
      - name: Set up PostgreSQL 16
        id: postgres
        uses: ikalnytskyi/action-setup-postgres@v6
        with:
          username: postgres
          password: postgres
          port: 5432
          postgres-version: "18"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Bootstrap database (deploy/postgres/init.sql)
        run: psql "${{ steps.postgres.outputs.connection-uri }}" -f deploy/postgres/init.sql

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Alembic round-trip (upgrade / downgrade / upgrade)
        working-directory: backend
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Backend tests
        working-directory: backend
        run: pytest
