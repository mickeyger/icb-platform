<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — BurtCost</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <span class="login-logo">BurtCost v2.0</span>
    <h2 class="login-title">Trailer Costing System</h2>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    {% if notice %}
    <div class="error-msg" style="background:#1e3a1e;color:#7ee87e;border-color:#2e5e2e">{{ notice }}</div>
    {% endif %}
    <form method="post" action="/login" id="login-form" style="{% if show_change %}display:none{% endif %}">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" name="username" autofocus autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
        Sign In
      </button>

      <div style="text-align:center;margin-top:14px;font-size:12px">
        <a href="#" id="show-change-link" style="color:var(--text-dim,#888);text-decoration:none">Change password</a>
      </div>
    </form>

    <form method="post" action="/login/change-password" id="change-form" style="{% if not show_change %}display:none{% endif %}">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" name="username" autocomplete="username" required
               value="{{ change_username or '' }}"/>
      </div>
      <div class="form-group">
        <label class="form-label">Current password</label>
        <input class="form-control" type="password" name="current_password" autocomplete="current-password" required/>
      </div>
      <div class="form-group">
        <label class="form-label">New password</label>
        <input class="form-control" type="password" name="new_password" autocomplete="new-password" minlength="6" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm new password</label>
        <input class="form-control" type="password" name="confirm_password" autocomplete="new-password" minlength="6" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
        Update password
      </button>
      <div style="text-align:center;margin-top:14px;font-size:12px">
        <a href="#" id="show-login-link" style="color:var(--text-dim,#888);text-decoration:none">&larr; Back to sign in</a>
      </div>
    </form>
  </div>
</div>
<div id="toast-container"></div>
<script>
  (function() {
    var loginForm  = document.getElementById('login-form');
    var changeForm = document.getElementById('change-form');
    var toChange   = document.getElementById('show-change-link');
    var toLogin    = document.getElementById('show-login-link');
    if (toChange) toChange.addEventListener('click', function(e) {
      e.preventDefault();
      loginForm.style.display = 'none';
      changeForm.style.display = '';
    });
    if (toLogin) toLogin.addEventListener('click', function(e) {
      e.preventDefault();
      changeForm.style.display = 'none';
      loginForm.style.display = '';
    });
  })();
</script>
</body>
</html>
