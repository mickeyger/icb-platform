{% extends "base.html" %}
{% block title %}User Permissions{% endblock %}
{% block breadcrumb %}<strong>Admin</strong> / User Permissions{% endblock %}

{% block content %}
<style>
  .perm-layout { display:grid; grid-template-columns: 280px 1fr; gap: 20px; }
  .perm-userlist { background: var(--bg-panel,#161b22); border:1px solid var(--border,#30363d);
                   border-radius:8px; max-height: 70vh; overflow-y:auto; }
  .perm-userlist .uitem {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; border-bottom:1px solid var(--border,#30363d);
    cursor:pointer; font-size:13px;
  }
  .perm-userlist .uitem:hover { background: rgba(56,139,253,0.08); }
  .perm-userlist .uitem.active { background: rgba(56,139,253,0.18); }
  .perm-userlist .role-pill {
    font-size:10px; padding:2px 6px; border-radius:10px;
    background:#1e2638; color:#8b949e; text-transform:uppercase; letter-spacing:.5px;
  }
  .perm-userlist .role-pill.admin { background:#3a1215; color:#ff6168; }
  .perm-userlist .role-pill.full  { background:#0d3a1f; color:#3fb950; }

  .perm-card {
    background: var(--bg-panel,#161b22); border:1px solid var(--border,#30363d);
    border-radius:8px; padding:18px;
  }
  .perm-cat-h {
    color: var(--blue-hi,#58a6ff); text-transform:uppercase; letter-spacing:1px;
    font-size:11px; margin: 12px 0 8px; border-bottom:1px solid var(--border,#30363d);
    padding-bottom:6px;
  }
  table.perm-table { width:100%; border-collapse:collapse; font-size:13px; }
  table.perm-table th, table.perm-table td {
    padding: 8px 10px; text-align:left;
    border-bottom:1px solid var(--border,#30363d); vertical-align: middle;
  }
  table.perm-table th { color: var(--text-dim,#8b949e); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
  .perm-name { font-family: var(--font-mono); font-size:12px; color:#c9d1d9; }
  .perm-desc { color: var(--text-dim,#8b949e); font-size:11.5px; margin-top:2px; }
  .effective-yes { color:#3fb950; font-weight:700; }
  .effective-no  { color:#f85149; font-weight:700; }

  .seg { display:inline-flex; border:1px solid var(--border,#30363d); border-radius:6px; overflow:hidden; }
  .seg button {
    border:0; padding:5px 10px; background:transparent; color:var(--text-dim,#8b949e);
    cursor:pointer; font-size:11px; min-width:64px;
  }
  .seg button.active.allow { background:#0d3a1f; color:#3fb950; }
  .seg button.active.deny  { background:#3a1215; color:#ff6168; }
  .seg button.active.reset { background:#1e2638; color:#c9d1d9; }
  .seg button:hover:not(.active) { background:rgba(255,255,255,0.04); }

  .empty-hint { color: var(--text-dim,#8b949e); padding: 24px; text-align:center; }
  .admin-banner {
    background: rgba(255,179,67,0.1); border:1px solid rgba(255,179,67,0.3);
    color:#ffb340; padding:10px 14px; border-radius:6px; margin-bottom:12px; font-size:12px;
  }
</style>

<div class="perm-layout">
  <!-- Users -->
  <div class="perm-userlist" id="perm-userlist">
    <div class="empty-hint">Loading users…</div>
  </div>

  <!-- Permissions matrix -->
  <div class="perm-card" id="perm-matrix">
    <div class="empty-hint">Select a user to view and edit their permissions.</div>
  </div>
</div>

<script>
let _selectedUserId = null;

async function loadUsers() {
  const list = document.getElementById('perm-userlist');
  try {
    const users = await api('GET', '/api/users');
    list.innerHTML = users.map(u => `
      <div class="uitem" data-uid="${u.id}" onclick="selectUser(${u.id}, this)">
        <div>
          <div style="color:var(--text-head);font-weight:600">${escHtml(u.username)}</div>
          <div style="color:var(--text-dim);font-size:11px">${u.created_at ? new Date(u.created_at).toLocaleDateString() : '—'}</div>
        </div>
        <span class="role-pill ${u.role}">${escHtml(u.role)}</span>
      </div>
    `).join('') || '<div class="empty-hint">No users.</div>';
  } catch(e) {
    list.innerHTML = '<div class="empty-hint">Failed to load users: ' + escHtml(e.message) + '</div>';
  }
}

async function selectUser(uid, el) {
  _selectedUserId = uid;
  document.querySelectorAll('#perm-userlist .uitem').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');
  await loadMatrix(uid);
}

async function loadMatrix(uid) {
  const card = document.getElementById('perm-matrix');
  card.innerHTML = '<div class="empty-hint">Loading permissions…</div>';
  try {
    const data = await api('GET', `/api/users/${uid}/permissions`);
    const isAdmin = data.user.role === 'admin';

    // Group rows by category
    const byCat = {};
    data.permissions.forEach(r => {
      (byCat[r.category] = byCat[r.category] || []).push(r);
    });

    let html = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div>
          <div style="color:var(--text-head);font-size:16px;font-weight:600">${escHtml(data.user.username)}</div>
          <div style="color:var(--text-dim);font-size:12px">Role: <span class="role-pill ${data.user.role}">${escHtml(data.user.role)}</span></div>
        </div>
      </div>
    `;

    if (isAdmin) {
      html += `<div class="admin-banner">⚠ Admin users have all permissions by default. Overrides set here are stored but ignored at runtime.</div>`;
    }

    for (const cat of Object.keys(byCat).sort()) {
      html += `<div class="perm-cat-h">${escHtml(cat)}</div>`;
      html += `<table class="perm-table"><thead><tr>
                 <th style="width:38%">Permission</th>
                 <th style="width:14%">Role default</th>
                 <th style="width:18%">Effective</th>
                 <th style="width:30%">Override</th>
               </tr></thead><tbody>`;
      for (const r of byCat[cat]) {
        const override = r.override || 'reset';
        html += `
          <tr>
            <td>
              <div class="perm-name">${escHtml(r.name)}</div>
              <div class="perm-desc">${escHtml(r.description || '')}</div>
            </td>
            <td>${r.role_default ? '<span style="color:#3fb950">✔</span>' : '<span style="color:#8b949e">—</span>'}</td>
            <td>
              ${r.effective
                ? '<span class="effective-yes">ALLOWED</span>'
                : '<span class="effective-no">DENIED</span>'}
            </td>
            <td>
              <div class="seg" data-perm="${escHtml(r.name)}">
                <button class="${override==='allow'?'active allow':''}" onclick="setPerm(this,'allow')">Allow</button>
                <button class="${override==='reset'?'active reset':''}" onclick="setPerm(this,'reset')">Default</button>
                <button class="${override==='deny' ?'active deny':''}"  onclick="setPerm(this,'deny')">Deny</button>
              </div>
            </td>
          </tr>`;
      }
      html += `</tbody></table>`;
    }

    card.innerHTML = html;
  } catch(e) {
    card.innerHTML = '<div class="empty-hint">Failed to load permissions: ' + escHtml(e.message) + '</div>';
  }
}

async function setPerm(btn, effect) {
  if (!_selectedUserId) return;
  const seg = btn.closest('.seg');
  const perm = seg.dataset.perm;
  // Optimistic UI
  seg.querySelectorAll('button').forEach(b => b.classList.remove('active','allow','deny','reset'));
  btn.classList.add('active', effect);
  try {
    await api('PUT', `/api/users/${_selectedUserId}/permissions/${encodeURIComponent(perm)}`, { effect });
    // Reload matrix to refresh "effective" column without losing scroll
    await loadMatrix(_selectedUserId);
  } catch(e) {
    toast('Failed to update permission: ' + e.message, 'error');
    await loadMatrix(_selectedUserId);
  }
}

function escHtml(str) {
  const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML;
}

async function api(method, url, data) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (data) opts.body = JSON.stringify(data);
  const res = await fetch(url, opts);
  if (!res.ok) {
    const errText = await res.text();
    throw new Error(errText || `HTTP ${res.status}`);
  }
  return res.json();
}

loadUsers();
</script>
{% endblock %}
