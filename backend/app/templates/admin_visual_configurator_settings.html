              onDragEnd={endDrag}
            >
              <div className="vs-folder-drop-copy">⠿ Drag into a folder or back to root.</div>
            </div>
          )}

          {isFolder && !isCollapsed && (
            <div className="vs-node-children">
              <div
                className={`vs-folder-drop ${hoverTarget === dropKey ? 'active' : ''}`}
                onDragOver={(event) => allowDrop(dropKey, event)}
                onDragLeave={() => setHoverTarget(current => current === dropKey ? '' : current)}
                onDrop={(event) => {
                  event.preventDefault();
                  handleDrop(nodeId);
                }}
              >
                <div className="vs-folder-drop-copy">
                  Drop categories or flags here. Flags and conditions inside a folder apply only to categories in this branch.
                </div>
              </div>
              {node.childIds.length ? renderNodes(nodeId) : (
                <div className="vs-folder-child-empty">This folder is empty. Add folders, flags, conditions, or drop categories here.</div>
              )}
            </div>
          )}
        </div>
      );
    });
  }

  // ── Config preview — live render from draft ─────────────────────────────────
  function pvToggle(nodeId) {
    setPvCollapsed(prev => ({ ...prev, [nodeId]: !prev[nodeId] }));
  }

  function pvRenderNode(nodeId, depth) {
    const node = draft.nodes[nodeId];
    if (!node) return null;
    const pl = 8 + depth * 14;
    const isCollapsed = !!pvCollapsed[nodeId];

    if (node.type === 'folder') {
      const selectable = node.folderMode === 'radio' || node.folderMode === 'tickbox';
      const active = !selectable || Number(node.folderValue) === 1;
      const childIds = node.childIds || [];
      return (
        <div key={nodeId}>
          <div className="vs-cp-folder-row" style={{paddingLeft: pl, opacity: active ? 1 : 0.45}}
               onClick={() => pvToggle(nodeId)}>
            <span className="vs-cp-tog">{isCollapsed ? '+' : '−'}</span>
            <span className="vs-cp-folder-name">{node.label}</span>
            <span className="vs-cp-badge">{folderModeLabel(node.folderMode)}</span>
            {selectable && <span className={`vs-cp-dot${active ? ' on' : ''}`} />}
            <span className="vs-cp-count">{childIds.length}</span>
          </div>
          {!isCollapsed && childIds.map(cid => pvRenderNode(cid, depth + 1))}
        </div>
      );
    }

    if (node.type === 'category') {
      const selectable = node.selectionMode === 'radio' || node.selectionMode === 'tickbox';
      const active = !selectable || Number(node.selectionValue) === 1;
      const catData = categories.find(c => c.key === node.sourceCategoryKey);
      const items = catData ? (catData.items || []) : [];
      return (
        <div key={nodeId}>
          <div className="vs-cp-category-row" style={{paddingLeft: pl, opacity: active ? 1 : 0.45}}
               onClick={() => pvToggle(nodeId)}>
            <span className="vs-cp-tog">{isCollapsed ? '+' : '−'}</span>
            <span className="vs-cp-cat-name">{node.label}</span>
            <span className="vs-cp-count">{items.length}</span>
            {selectable && <span className={`vs-cp-dot${active ? ' on' : ''}`} />}
          </div>
          {!isCollapsed && items.map(item => {
            const rule = itemRuleState(draft, item.id, item);
            const excluded = rule.mode === 'always_exclude';
            const conds = excluded ? [] : (rule.conditions || []);
            return (
              <div key={item.id} className="vs-cp-item"
                   style={{paddingLeft: pl + 14, opacity: excluded ? 0.35 : 1}}>
                <span className="vs-cp-item-name">{item.name}</span>
                {excluded && <span className="vs-cp-cond exclude">out</span>}
                {conds.map((c, i) => (
                  <span key={i} className="vs-cp-cond">{c.option}={c.equals}</span>
                ))}
              </div>
            );
          })}
        </div>
      );
    }

    if (node.type === 'flag') {
      const on = Number(node.flagValue) === 1;
      return (
        <div key={nodeId} className="vs-cp-flag-row" style={{paddingLeft: pl}}>
          <span className={`vs-cp-dot${on ? ' on' : ''}`} />
          <span className="vs-cp-flag-name">{node.label}</span>
          <span className="vs-cp-badge">{flagModeLabel(node.flagMode)}</span>
        </div>
      );
    }

    if (node.type === 'condition') {
      return (
        <div key={nodeId} className="vs-cp-cond-row" style={{paddingLeft: pl}}>
          <span className="vs-cp-cond">{node.label}</span>
        </div>
      );
    }

    return null;
  }
  // ── end config preview ──────────────────────────────────────────────────────

  return (
    <div className="vs-shell">
      <div className={`vs-layout${showPreview ? ' with-preview' : ''}`}>
        <div className="vs-card vs-panel">
          <div className="vs-panel-head">
            <div className="vs-head-row">
              <h2>Configurator Explorer</h2>
              <button className="vs-info-btn" title="Build the structure with folders, flags, and conditions. Categories can only come from the right panel. Root-level flags and conditions are global. Folder-level flags and conditions apply only inside that folder branch.">ℹ</button>
            </div>
            <div className="vs-panel-tools">
              <select value={trailerId || ''} onChange={(event) => setTrailerId(parseInt(event.target.value, 10))}>
                {BOOT.trailers.map(trailer => (
                  <option key={trailer.id} value={trailer.id}>{trailer.name}</option>
                ))}
              </select>
              <button className="vs-icon-btn"
                onClick={openSnapshots}
                disabled={!trailerId}
                title="Snapshots — save the current Explorer config and restore it later if things get messed up"
                style={{fontSize:'13px',padding:'2px 8px',border:'1px solid var(--border)',borderRadius:'4px'}}>
                📸 Snapshots
              </button>
              <span className="vs-sep" />
              <button className="vs-icon-btn" onClick={undo} disabled={!timeline.past.length} title="Undo">↩</button>
              <button className="vs-icon-btn" onClick={redo} disabled={!timeline.future.length} title="Redo">↪</button>
              <button className="vs-icon-btn" onClick={collapseAll} disabled={!draft.rootIds.length} title="Collapse all">⊟</button>
              <button className="vs-icon-btn" onClick={expandAll} disabled={!draft.rootIds.length} title="Expand all">⊞</button>
              <button className="vs-icon-btn danger" onClick={clearDraft} disabled={!draft.rootIds.length} title="Clear explorer">✕</button>
              <button className="vs-icon-btn primary" onClick={() => { setTimeline({ past: draft.rootIds.length ? [draft] : [], present: generateDefaultDraft(categories, bodyOptions), future: [] }); setCollapsed({}); setSelectedId(null); }} disabled={!categories.length} title="Generate a default layout from this trailer's BOM sections and body options">⚡ Default</button>
              <span className="vs-sep" />
              <button className="vs-icon-btn primary" onClick={() => openCreate('folder', null)} title="New folder">📂 Folder</button>
              <button className="vs-icon-btn" onClick={() => openCreate('flag', null)} title="New flag">⚑ Flag</button>
              <button className="vs-icon-btn" onClick={() => openCreate('condition', null)} title="New condition">⌥ Cond</button>
              <span className="vs-sep" />
              <span className="vs-count-badge" title="Folders">{counts.folders} 📁</span>
              <span className="vs-count-badge" title="Categories">{counts.categories} ☰</span>
              <span className="vs-count-badge" title="Flags">{counts.flags} ⚑</span>
              <span className={`vs-count-badge${loadState === 'error' ? ' err' : ''}`} title={loadState === 'loading' ? 'Loading categories' : loadState === 'error' ? 'Category load failed' : 'Categories loaded'}>
                {loadState === 'loading' ? '…' : loadState === 'error' ? '⚠' : '✓'}
              </span>
              <button
                className={`vs-icon-btn${showPreview ? ' primary' : ''}`}
                style={{marginLeft:'auto'}}
                onClick={() => setShowPreview(v => !v)}
                title="Toggle config structure preview"
              >
                ⊡ Preview
              </button>
            </div>
          </div>
          <div className="vs-panel-body">
            {notice && <div className="vs-notice">{notice}</div>}
            <div
              className={`vs-drop-root ${hoverTarget === 'root' ? 'active' : ''}`}
              onDragOver={(event) => allowDrop('root', event)}
              onDragLeave={() => setHoverTarget(current => current === 'root' ? '' : current)}
              onDrop={(event) => {
                event.preventDefault();
                handleDrop(null);
              }}
            >
              <div className="vs-root-title">Root directory</div>
              <div className="vs-root-copy">
                Drop categories here to create root-level category nodes, or create folders, flags, and conditions manually.
              </div>
            </div>

            {draft.rootIds.length ? (
              <div className="vs-tree">{renderNodes(null)}</div>
            ) : (
              <div className="vs-empty">
                The left panel is intentionally blank. Start by creating a folder, flag, or condition, or drag a category in from the right.
              </div>
            )}
          </div>
        </div>

        <div className="vs-card vs-panel">
          <div className="vs-panel-head">
            <div className="vs-head-row">
              <h2>Available Categories</h2>
              <button className="vs-info-btn" title="These categories come from the selected body type. Once a category is used on the left, it stays visible here but becomes clearly unavailable until removed.">ℹ</button>
            </div>
            <div className="vs-catalog-tools">
              <input value={search} onChange={(event) => setSearch(event.target.value)} placeholder="Search categories..." />
              <select value={filter} onChange={(event) => setFilter(event.target.value)}>
                <option value="all">All</option>
                <option value="unused">Unused only</option>
                <option value="used">Used only</option>
                <option value="selected">Show only selected</option>
              </select>
            </div>
          </div>
          <div className="vs-panel-body">
            {filteredCategories.length ? (
              <div className="vs-catalog-grid">
                {filteredCategories.map(category => {
                  const usedNodeId = usedCategoryMap[category.key];
                  const used = !!usedNodeId;
                  const usedPath = used ? buildNodePath(draft, usedNodeId).join(' / ') : '';
                  const isExpanded = activeCatalogKey === category.key;
                  return (
                    <div
                      key={category.key}
                      ref={(element) => {
                        if (element) catalogRefs.current[category.key] = element;
                        else delete catalogRefs.current[category.key];
                      }}
                      className={`vs-catalog-card ${used ? 'used' : 'available'} ${isExpanded ? 'focused' : ''}`}
                      draggable={!used}
                      onDragStart={(event) => startPaletteDrag(category, event)}
                      onDragEnd={endDrag}
                      title={used ? `Used in ${usedPath}` : `Drag ${category.name} into the layout`}
                    >
                      <button
                        type="button"
                        className="vs-catalog-toggle"
                        onClick={() => toggleCatalogCard(category.key)}
                        aria-expanded={isExpanded ? 'true' : 'false'}
                      >
                        <div className="vs-catalog-title">{category.name}</div>
                        <div className="vs-catalog-meta">
                          {category.itemCount || 0} BOM item{category.itemCount === 1 ? '' : 's'}
                        </div>
                        <div className="vs-catalog-state">
                          <span className="vs-catalog-state-dot"></span>
                          {used ? `Used in ${usedPath}` : 'Ready to drag'}
                        </div>
                        <span className="vs-catalog-chevron">{isExpanded ? '-' : '+'}</span>
                      </button>
                      {isExpanded ? (
                        <div className="vs-catalog-items">
                          {(category.items || []).length ? (
                            category.items.map(item => (
                              (() => {
                                const rule = itemRuleState(draft, item.id, item);
                                const summary = ruleSummary(rule);
                                const evaluation = evaluateRule(rule, activeRuleNames);
                                const categoryNodeId = usedCategoryMap[category.key];
                                const branchActive = !categoryNodeId || folderBranchActive(draft, categoryNodeId);
                                const itemIncluded = evaluation.included && branchActive;
                                return (
                              <div
                                key={item.id}
                                className="vs-catalog-item"
                                style={itemIncluded ? null : { opacity: 0.55 }}
                              >
                                <span className="vs-catalog-item-name">{item.name}</span>
                                <div className="vs-rule-summary">
                                  {summary.state === 'always_exclude' ? (
                                    <span className="vs-rule-chip exclude">always out</span>
                                  ) : null}
                                  {(summary.state === 'include' || summary.state === 'exclude') ? (
                                    (rule.conditions || []).map((condition, index) => (
                                      <span
                                        key={`${item.id}-${index}`}
                                        className={`vs-rule-chip ${rule.mode === 'exclude' ? 'exclude' : 'include'}`}
                                      >
                                        {ruleChipText(rule, condition)}
                                      </span>
                                    ))
                                  ) : null}
                                </div>
                                <div className="vs-catalog-item-side">
                                  {item.sapCode ? <span className="vs-catalog-item-meta">SAP {item.sapCode}</span> : null}
                                  <span className="vs-catalog-item-meta">Unit {Number(item.unitPrice || 0).toFixed(2)}</span>
                                  <button
                                    className="vs-link-btn"
                                    disabled={!used}
                                    title={used ? 'Edit inclusion rules' : 'Place this category in the explorer first'}
                                    onClick={() => openItemRuleEditor(category, item)}
                                  >
                                    Edit rules
                                  </button>
                                </div>
                              </div>
                                );
                              })()
                            ))
                          ) : (
                            <div className="vs-folder-child-empty">No BOM items are linked to this category yet.</div>
                          )}
                        </div>
                      ) : null}
                    </div>
                  );
                })}
              </div>
            ) : (
              <div className="vs-empty">No categories match the current filter.</div>
            )}
          </div>
        </div>

        {showPreview && (
          <div className="vs-card vs-panel">
            <div className="vs-panel-head">
              <div className="vs-head-row">
                <h2>Config Structure</h2>
                <button className="vs-info-btn" title="Live view of the explorer structure. Click any folder or category to expand / collapse.">ℹ</button>
              </div>
            </div>
            <div className="vs-panel-body" style={{padding:0}}>
              {draft.rootIds.length ? (
                <div>{draft.rootIds.map(id => pvRenderNode(id, 0))}</div>
              ) : (
                <div className="vs-empty">Nothing in the explorer yet.</div>
              )}
            </div>
          </div>
        )}
      </div>

      {ruleEditor && (
        <ItemRuleEditor
          editor={ruleEditor}
          onSave={saveItemRule}
          onClose={() => setRuleEditor(null)}
          saving={savingRule}
        />
      )}

      {snapshotsOpen && (
        <div className="vs-modal-backdrop" onClick={() => setSnapshotsOpen(false)}>
          <div className="vs-modal" style={{width:'min(560px,100%)'}} onClick={(event) => event.stopPropagation()}>
            <div className="vs-modal-head">
              <h3>📸 Explorer Config Snapshots</h3>
            </div>
            <div className="vs-modal-body" style={{gap:'14px',maxHeight:'72vh',overflowY:'auto'}}>
              <div style={{fontSize:'11px',color:'var(--text-dim)',lineHeight:'1.5'}}>
                Captures the current Explorer config for <strong style={{color:'var(--text-head)'}}>{currentTrailerName || '—'}</strong> only.
                BOM data, prices, and other settings are not touched. Restoring overwrites the live draft;
                an auto-backup snapshot is captured first so you can roll back the restore itself.
              </div>

              <div style={{borderTop:'1px solid var(--border)',paddingTop:'12px'}}>
                <label style={{display:'block',fontSize:'12px',fontWeight:700,marginBottom:'6px'}}>
                  Snapshot label
                </label>
                <div style={{display:'flex',gap:'8px'}}>
                  <input
                    value={snapshotLabel}
                    onChange={(event) => setSnapshotLabel(event.target.value)}
                    placeholder={snapshotDefaultLabel()}
                    style={{flex:1,padding:'6px 10px',borderRadius:'var(--radius)',border:'1px solid var(--border)',background:'var(--bg-input)',color:'var(--text)',fontSize:'12px'}}
                  />
                  <button
                    className="vs-btn vs-btn-primary"
                    style={{minHeight:'auto',padding:'6px 14px',fontSize:'12px'}}
                    onClick={captureSnapshot}
                    disabled={snapshotBusy || !trailerId}
                  >
                    {snapshotBusy ? '…' : '📸 Capture'}
                  </button>
                </div>
                <div style={{fontSize:'10px',color:'var(--text-dim)',marginTop:'4px'}}>
                  Default: body type + today's date. Edit to append notes (e.g. "before reorg").
                </div>
              </div>

              <div style={{borderTop:'1px solid var(--border)',paddingTop:'12px'}}>
                <div style={{fontSize:'12px',fontWeight:700,marginBottom:'8px'}}>
                  History {snapshotList.length ? `(${snapshotList.length})` : ''}
                </div>
                {snapshotList.length ? (
                  <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                    {snapshotList.map(snap => (
                      <div key={snap.id}
                        style={{display:'flex',alignItems:'center',gap:'10px',padding:'8px 10px',background:'var(--bg-panel)',border:'1px solid var(--border)',borderRadius:'var(--radius)'}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:'12px',fontWeight:600,color:'var(--text-head)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                            {snap.label}
                          </div>
                          <div style={{fontSize:'10px',color:'var(--text-dim)',fontFamily:'var(--font-mono)'}}>
                            {snap.created_at ? new Date(snap.created_at).toLocaleString() : ''}
                            {snap.created_by ? ` · ${snap.created_by}` : ''}
                          </div>
                        </div>
                        <button
                          className="vs-icon-btn primary"
                          title="Restore this snapshot (captures a safety backup first)"
                          onClick={() => restoreSnapshot(snap)}
                          disabled={snapshotBusy}
                          style={{padding:'4px 10px',fontSize:'11px'}}>
                          ↺ Restore
                        </button>
                        <button
                          className="vs-icon-btn danger"
                          title="Delete this snapshot"
                          onClick={() => deleteSnapshot(snap)}
                          disabled={snapshotBusy}
                          style={{padding:'4px 8px',fontSize:'11px'}}>
                          🗑
                        </button>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div style={{fontSize:'11px',color:'var(--text-dim)',padding:'10px',background:'var(--bg-panel)',border:'1px dashed var(--border)',borderRadius:'var(--radius)',textAlign:'center'}}>
                    No snapshots yet — capture one above when you're happy with the current config.
                  </div>
                )}
              </div>
            </div>
            <div className="vs-modal-foot">
              <button className="vs-btn" onClick={() => setSnapshotsOpen(false)}>Close</button>
            </div>
          </div>
        </div>
      )}

      {dialog && (
        <div className="vs-modal-backdrop" onClick={closeDialog}>
          <div className="vs-modal" onClick={(event) => event.stopPropagation()}>
            <div className="vs-modal-head">
              <h3>
                {dialog.mode === 'create'
                  ? `Create ${nodeTypeLabel(dialog.nodeType)}`
                  : `Rename ${nodeTypeLabel(dialog.nodeType)}`}
              </h3>
            </div>
            <div className="vs-modal-body">
              <label>
                Name
                <input
                  autoFocus
                  value={dialog.label}
                  onChange={(event) => setDialog(current => ({ ...current, label: event.target.value }))}
                  placeholder={`Enter ${nodeTypeLabel(dialog.nodeType).toLowerCase()} name`}
                  onKeyDown={(event) => {
                    if (event.key === 'Enter') submitDialog();
                  }}
                />
              </label>
              {dialog.mode === 'create' && dialog.nodeType === 'folder' && (
                <label>
                  Folder mode
                  <select
                    value={dialog.folderMode}
                    onChange={(event) => setDialog(current => ({ ...current, folderMode: event.target.value }))}
                  >
                    {FOLDER_MODES.map(mode => (
                      <option key={mode.value} value={mode.value}>{mode.label}</option>
                    ))}
                  </select>
                </label>
              )}
              {(dialog.nodeType === 'flag') && (
                <>
                  <label>
                    Flag mode
                    <select
                      value={dialog.flagMode || 'tickbox'}
                      onChange={(event) => setDialog(current => ({ ...current, flagMode: event.target.value }))}
                    >
                      {FLAG_MODES.map(mode => (
                        <option key={mode.value} value={mode.value}>{mode.label}</option>
                      ))}
                    </select>
                  </label>
                  <label>
                    Linked option
                    <select
                      value={dialog.flagBindingName || ''}
                      onChange={(event) => {
                        const value = event.target.value;
                        const option = bodyOptionLookup.get(value);
                        setDialog(current => ({
                          ...current,
                          flagBindingName: value,
                          flagBindingId: option ? option.id : null,
                        }));
                      }}
                    >
                      <option value="">Use flag label only</option>
                      {bodyOptions.map(option => (
                        <option key={option.id} value={option.name}>
                          {option.name}{option.group ? ` (${option.group})` : ''}
                        </option>
                      ))}
                    </select>
                  </label>
                </>
              )}
            </div>
            <div className="vs-modal-foot">
              <button className="vs-btn" onClick={closeDialog}>Cancel</button>
              <button className="vs-btn vs-btn-primary" onClick={submitDialog} disabled={!(dialog.label || '').trim()}>
                {dialog.mode === 'create' ? 'Create' : 'Rename'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('visual-settings-root')).render(<App />);
</script>
