{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block breadcrumb %}<strong>Admin</strong> / Settings{% endblock %}

{% block content %}
<style>
  #visual-settings-root {
    height: calc(100vh - 112px);
    padding: 0;
    background: transparent;
    color: var(--text);
    overflow: hidden;
    box-sizing: border-box;
    font-family: var(--font-sans);
  }
  .vs-shell {
    display: grid;
    grid-template-rows: 1fr;
    gap: 0;
    height: 100%;
    min-height: 0;
  }
  .vs-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .vs-pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .vs-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-panel);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
  }
  .vs-panel-head input,
  .vs-node-mode {
    min-height: 26px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text);
    padding: 3px 8px;
    font-size: 11px;
  }
  .vs-btn {
    min-height: 40px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text);
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .12s ease, border-color .12s ease, background .12s ease;
  }
  .vs-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    border-color: var(--blue);
    color: var(--text-head);
  }
  .vs-btn:disabled {
    opacity: .56;
    cursor: not-allowed;
  }
  .vs-btn-primary {
    border-color: var(--blue);
    background: var(--blue);
    color: #fff;
  }
  .vs-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.35fr) minmax(320px, .95fr);
    gap: 12px;
    min-height: 0;
    height: 100%;
  }
  .vs-panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    height: 100%;
  }
  .vs-panel-head {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
  }
  .vs-head-row {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 3px;
  }
  .vs-panel-head h2 {
    margin: 0;
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--text-head);
    font-family: var(--font-mono);
    text-transform: uppercase;
    flex: 1;
  }
  .vs-panel-head p { display: none; }
  .vs-info-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 9px;
    font-weight: 700;
    width: 16px;
    height: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
  }
  .vs-info-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .vs-panel-body {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding: 10px 12px 14px;
  }
  .vs-panel-tools {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
    margin-top: 3px;
  }
  .vs-sep {
    width: 1px;
    height: 16px;
    background: var(--border);
    flex-shrink: 0;
    margin: 0 2px;
  }
  .vs-count-badge {
    display: inline-flex;
    align-items: center;
    padding: 1px 5px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text-dim);
    font-size: 9px;
    font-weight: 700;
    font-family: var(--font-mono);
    white-space: nowrap;
  }
  .vs-count-badge.err { color: var(--red); border-color: var(--red); }
  .vs-icon-btn.primary {
    border-color: var(--blue);
    background: color-mix(in srgb, var(--blue) 15%, var(--bg-panel));
    color: var(--blue-hi, var(--blue));
  }
  .vs-icon-btn.primary:hover:not(:disabled) {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
  }
  .vs-icon-btn.danger:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
  .vs-drop-root {
    margin-bottom: 8px;
    padding: 7px 10px;
    border-radius: var(--radius);
    border: 1px dashed var(--border);
    background: var(--bg-panel);
    transition: border-color .12s ease, background .12s ease, transform .12s ease;
  }
  .vs-drop-root.active,
  .vs-folder-drop.active {
    border-color: var(--blue);
    background: var(--blue-dim);
    transform: translateY(-1px);
  }
  .vs-root-title {
    font-size: 10px;
    font-weight: 700;
    margin-bottom: 2px;
    color: var(--text-head);
    font-family: var(--font-mono);
    text-transform: uppercase;
  }
  .vs-root-copy {
    color: var(--text-dim);
    font-size: 9px;
  }
  .vs-empty {
    padding: 24px 18px;
    border-radius: var(--radius);
    border: 1px dashed var(--border);
    background: var(--bg-panel);
    color: var(--text-dim);
    text-align: center;
    font-size: 12px;
  }
  .vs-tree {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .vs-node {
    --vs-node-accent: var(--border-hi);
    --vs-node-tint: var(--bg-card);
    --vs-node-chip-bg: var(--bg-panel);
    --vs-node-chip-border: var(--border);
    --vs-node-chip-text: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--vs-node-tint);
  }
  .vs-node.folder {
    --vs-node-accent: #FFB454;
    --vs-node-tint: color-mix(in srgb, #FFB454 10%, var(--bg-card));
    --vs-node-chip-bg: color-mix(in srgb, #FFB454 14%, var(--bg-panel));
    --vs-node-chip-border: color-mix(in srgb, #FFB454 34%, var(--border));
    --vs-node-chip-text: #FFB454;
    border-left: 3px solid var(--vs-node-accent);
  }
  .vs-node.category {
    --vs-node-accent: var(--blue);
    --vs-node-tint: color-mix(in srgb, var(--blue) 10%, var(--bg-card));
    --vs-node-chip-bg: color-mix(in srgb, var(--blue) 14%, var(--bg-panel));
    --vs-node-chip-border: color-mix(in srgb, var(--blue) 34%, var(--border));
    --vs-node-chip-text: var(--blue-hi);
    border-left: 3px solid var(--vs-node-accent);
  }
  .vs-node.flag {
    --vs-node-accent: var(--green);
    --vs-node-tint: color-mix(in srgb, var(--green) 10%, var(--bg-card));
    --vs-node-chip-bg: color-mix(in srgb, var(--green) 14%, var(--bg-panel));
    --vs-node-chip-border: color-mix(in srgb, var(--green) 34%, var(--border));
    --vs-node-chip-text: var(--green);
    border-left: 3px solid var(--vs-node-accent);
  }
  .vs-node.condition {
    --vs-node-accent: var(--orange);
    --vs-node-tint: color-mix(in srgb, var(--orange) 10%, var(--bg-card));
    --vs-node-chip-bg: color-mix(in srgb, var(--orange) 14%, var(--bg-panel));
    --vs-node-chip-border: color-mix(in srgb, var(--orange) 34%, var(--border));
    --vs-node-chip-text: var(--orange);
    border-left: 3px solid var(--vs-node-accent);
  }
  .vs-node-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 2px 6px 2px 8px;
  }
  .vs-node.selected {
    box-shadow: inset 0 0 0 1px var(--blue), 0 0 0 1px var(--blue);
  }
  .vs-node-toggle {
    width: 16px;
    height: 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-panel);
    font-size: 9px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    color: var(--text);
  }
  .vs-node-dot {
    width: 16px;
    height: 16px;
    border-radius: var(--radius);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 7px;
    font-weight: 800;
    letter-spacing: .02em;
    background: var(--vs-node-chip-bg);
    color: var(--vs-node-chip-text);
    border: 1px solid var(--vs-node-chip-border);
  }
  .vs-node-main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    overflow: hidden;
  }
  .vs-node-head {
    display: flex;
    flex-wrap: nowrap;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }
  .vs-node-title {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--text-head);
    white-space: nowrap;
  }
  .vs-node-badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 5px;
    border-radius: 999px;
    background: var(--vs-node-chip-bg);
    border: 1px solid var(--vs-node-chip-border);
    color: var(--vs-node-chip-text);
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    font-family: var(--font-mono);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .vs-node-sub {
    color: var(--text-dim);
    font-size: 9px;
    line-height: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .vs-node-actions {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-left: auto;
    flex-wrap: nowrap;
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .vs-node-action-buttons {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    flex-wrap: nowrap;
    flex: 0 0 auto;
  }
  .vs-icon-btn {
    min-width: 22px;
    height: 22px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-panel);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 9px;
    font-weight: 800;
    padding: 0 5px;
  }
  .vs-icon-btn:hover:not(:disabled) {
    color: var(--text-head);
    border-color: var(--blue);
  }
  .vs-icon-btn:disabled {
    opacity: .40;
    cursor: not-allowed;
  }
  .vs-node-mode {
    width: auto;
    min-width: 80px;
    max-width: 96px;
    min-height: 22px;
    padding: 2px 6px;
    font-size: 9px;
    font-weight: 700;
    flex: 0 0 auto;
  }
  .vs-flag-state {
    min-width: 44px;
    height: 22px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-panel);
    color: var(--text-dim);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    padding: 0 6px;
    font-size: 9px;
    font-weight: 800;
    flex: 0 0 auto;
  }
  .vs-flag-state.on {
    border-color: var(--green);
    background: color-mix(in srgb, var(--green) 12%, var(--bg-panel));
    color: var(--green);
  }
  .vs-flag-glyph {
    width: 12px;
    height: 12px;
    border: 1px solid currentColor;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    line-height: 1;
    flex-shrink: 0;
  }
  .vs-flag-glyph.radio {
    border-radius: 999px;
  }
  .vs-flag-glyph.tickbox {
    border-radius: 2px;
  }
  .vs-node-children {
    padding: 0 6px 4px 24px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    position: relative;
  }
  .vs-node-children::before {
    content: '';
    position: absolute;
    top: 0;
    bottom: 10px;
    left: 11px;
    width: 1px;
    background: var(--border);
    border-radius: 1px;
  }
  .vs-folder-drop {
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    background: var(--bg-panel);
    padding: 5px 8px;
  }
  .vs-folder-drop-copy {
    color: var(--text-dim);
    font-size: 9px;
  }
  .vs-folder-child-empty {
    padding: 6px 10px;
    border-radius: var(--radius);
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-size: 9px;
    background: var(--bg-panel);
  }
  .vs-catalog-tools {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 3px;
  }
  .vs-catalog-tools input {
    flex: 1;
    min-width: 180px;
  }
  .vs-catalog-grid {
    display: block;
    border-top: 1px solid var(--border);
  }
  .vs-catalog-card {
    border-bottom: 1px solid var(--border);
    background: transparent;
    overflow: hidden;
  }
  .vs-catalog-card.available {
    cursor: grab;
  }
  .vs-catalog-card.available:hover .vs-catalog-toggle {
    background: var(--bg-input);
  }
  .vs-catalog-card.used .vs-catalog-title {
    color: var(--text-dim);
  }
  .vs-catalog-card.focused .vs-catalog-toggle {
    background: color-mix(in srgb, var(--blue) 8%, var(--bg-panel));
  }
  .vs-catalog-toggle {
    width: 100%;
    border: 0;
    background: transparent;
    color: inherit;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    cursor: pointer;
  }
  .vs-catalog-card * {
    cursor: inherit;
  }
  .vs-catalog-toggle:focus-visible {
    outline: 1px solid var(--blue);
    outline-offset: -1px;
  }
  .vs-catalog-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: -0.01em;
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-head);
  }
  .vs-catalog-meta {
    color: var(--text-dim);
    font-size: 9px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .vs-catalog-state {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
    font-size: 9px;
    font-weight: 700;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .vs-catalog-state-dot {
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: var(--orange);
    flex-shrink: 0;
  }
  .vs-catalog-card.available .vs-catalog-state-dot {
    background: var(--blue);
  }
  .vs-catalog-card.available:active {
    cursor: grabbing;
  }
  .vs-catalog-chevron {
    width: 16px;
    height: 16px;
    color: var(--text-dim);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .vs-catalog-items {
    border-top: 1px solid var(--border);
    background: color-mix(in srgb, var(--blue) 4%, var(--bg-panel));
  }
  .vs-catalog-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 10px 4px 22px;
    border-bottom: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
  }
  .vs-catalog-item:last-child {
    border-bottom: 0;
  }
  .vs-catalog-item:hover {
    background: var(--bg-input);
  }
  .vs-catalog-item-name {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-head);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .vs-catalog-item-meta,
  .vs-catalog-item-side {
    font-size: 9px;
    line-height: 1.2;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .vs-catalog-item-side {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .vs-rule-summary {
    display: flex;
    flex-wrap: nowrap;
    gap: 4px;
    align-items: center;
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }
  .vs-rule-note {
    font-size: 9px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .vs-rule-note.always-exclude {
    color: var(--red);
  }
  .vs-rule-chip {
    display: inline-flex;
    align-items: center;
    padding: 1px 5px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-panel);
    color: var(--text-dim);
    font-size: 9px;
    font-weight: 700;
    line-height: 1.2;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .vs-rule-chip.include {
    border-color: rgba(163,113,247,.4);
    background: rgba(163,113,247,.12);
    color: #a371f7;
  }
  .vs-rule-chip.exclude {
    border-color: color-mix(in srgb, var(--red) 36%, var(--border));
    background: color-mix(in srgb, var(--red) 10%, var(--bg-panel));
    color: var(--red);
  }
  .vs-rule-actions {
    margin-top: 6px;
    display: flex;
    justify-content: flex-end;
  }
  .vs-link-btn {
    border: 0;
    background: transparent;
    color: var(--blue-hi);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    padding: 0;
  }
  .vs-link-btn:disabled {
    color: var(--text-dim);
    cursor: not-allowed;
  }
  .vs-rule-scope-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
  }
  .vs-rule-row {
    display: grid;
    grid-template-columns: 42px minmax(0, 1fr) 22px minmax(0, 170px) auto;
    gap: 8px;
    align-items: center;
  }
  .vs-rule-when {
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
    font-family: var(--font-mono);
  }
  .vs-rule-help {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.4;
  }
  .vs-notice {
    margin-bottom: 12px;
    padding: 10px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--orange);
    background: var(--bg-card);
    background: color-mix(in srgb, var(--orange) 10%, var(--bg-card));
    color: var(--orange);
    font-size: 12px;
  }
  .vs-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    background: color-mix(in srgb, var(--bg-dark) 72%, transparent);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5000;
    padding: 20px;
  }
  .vs-modal {
    width: min(420px, 100%);
    border-radius: var(--radius);
    background: var(--bg-card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .vs-modal-head,
  .vs-modal-foot {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .vs-modal-foot {
    border-top: 1px solid var(--border);
    border-bottom: 0;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .vs-modal-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .vs-modal-head h3 {
    margin: 0;
    font-size: 16px;
    color: var(--text-head);
    font-family: var(--font-mono);
    text-transform: uppercase;
  }
  .vs-modal-body label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .vs-modal-body input,
  .vs-modal-body select {
    min-height: 40px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text);
    padding: 10px 12px;
    font-size: 13px;
  }
  .vs-rule-modal {
    width: min(760px, 100%);
  }
  .vs-rule-modal-body {
    max-height: 72vh;
    overflow: auto;
    gap: 14px;
  }
  .vs-rule-mode-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .vs-rule-mode-label {
    display: flex !important;
    flex-direction: row !important;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-panel);
    color: var(--text);
  }
  .vs-rule-mode-label input {
    margin-top: 2px;
    flex-shrink: 0;
  }
  .vs-rule-mode-copy {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .vs-rule-mode-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-head);
  }
  .vs-rule-mode-sub {
    font-size: 11px;
    color: var(--text-dim);

<script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const BOOT = window.__VISUAL_SETTINGS_BOOT__ || { trailers: [] };
const FOLDER_MODES = [
  { value: 'container', label: 'Container' },
  { value: 'radio', label: 'Radio' },
  { value: 'tickbox', label: 'Tick box' },
];
const FLAG_MODES = [
  { value: 'radio', label: 'Radio' },
  { value: 'tickbox', label: 'Tick box' },
];

function clone(value) {
  return JSON.parse(JSON.stringify(value));
}

function createEmptyDraft() {
  return { nextId: 1, rootIds: [], nodes: {}, itemRules: {} };
}

function normalizeDraft(parsed) {
  if (!parsed || !parsed.nodes || !Array.isArray(parsed.rootIds)) return createEmptyDraft();
  return {
    nextId: Number(parsed.nextId || 1),
    rootIds: Array.isArray(parsed.rootIds) ? parsed.rootIds : [],
    nodes: Object.fromEntries(Object.entries(parsed.nodes || {}).map(([id, node]) => [
      id,
      {
        ...node,
        flagMode: node && node.type === 'flag' ? (node.flagMode || 'tickbox') : (node?.flagMode || null),
        flagValue: node && node.type === 'flag' ? (Number(node.flagValue) ? 1 : 0) : (node?.flagValue || 0),
        flagBindingName: node && node.type === 'flag' ? (node.flagBindingName || '') : (node?.flagBindingName || ''),
        flagBindingId: node && node.type === 'flag' ? (node.flagBindingId || null) : (node?.flagBindingId || null),
      },
    ])),
    itemRules: parsed.itemRules && typeof parsed.itemRules === 'object' ? parsed.itemRules : {},
  };
}

function storageKey(trailerId) {
  return `visual-body-configurator-ui:${trailerId}`;
}

// ── Generate Default Draft ────────────────────────────────────────────────────
// Builds a sensible starting draft from the API data.
// Structure:
//   DOOR TYPE (radio folder) → DRD | SRD categories, each with EPS/PU radio flags
//   FRONT / SIDES / ROOF / FLOOR → categories with their EPS/PU/misc flags
//   All other sections → plain category nodes (no flags)
function generateDefaultDraft(categories, bodyOptions) {
  console.log('[generateDefaultDraft] categories:', categories.length, categories.map(c => c.key));
  console.log('[generateDefaultDraft] bodyOptions:', bodyOptions.length, bodyOptions.map(o => `${o.name}(grp=${o.group})`));

  const draft = createEmptyDraft();
  let nextId = 1;
  const newId = () => String(nextId++);

  const addNode = (node) => {
    const nid = newId();
    draft.nodes[nid] = { childIds: [], ...node, id: nid };
    return nid;
  };
  const addChild = (parentId, childId) => {
    if (draft.nodes[parentId]) draft.nodes[parentId].childIds.push(childId);
  };

  // Group body options by their .group field (upper-cased)
  const optsByGroup = {};
  bodyOptions.forEach(opt => {
    const grp = (opt.group || '').toUpperCase().trim();
    if (!grp) return;
    if (!optsByGroup[grp]) optsByGroup[grp] = [];
    optsByGroup[grp].push(opt);
  });
  console.log('[generateDefaultDraft] optsByGroup keys:', Object.keys(optsByGroup));

  // Door-type groups: DRD and SRD always go under a DOOR TYPE radio folder
  const DOOR_KEYS = ['DRD', 'SRD'];
  // Only create the door folder if at least one door section exists
  const doorSections = DOOR_KEYS.filter(k =>
    optsByGroup[k] || categories.find(c => c.key === k)
  );

  const placedKeys = new Set();

  if (doorSections.length) {
    const doorFolderId = addNode({ type: 'folder', label: 'DOOR TYPE', selectionMode: 'radio', parentId: null });
    draft.rootIds.push(doorFolderId);

    doorSections.forEach((key, ki) => {
      const catLabel = key;
      const catId = addNode({ type: 'category', label: catLabel, sourceCategoryKey: key, parentId: doorFolderId });
      addChild(doorFolderId, catId);
      placedKeys.add(key);

      // Add flags for this door type's body options (EPS/PU as radio, others as tickbox)
      const opts = optsByGroup[key] || [];
      opts.forEach((opt, i) => {
        const isRadio = opt.selectionMode === 'single';
        const flagId = addNode({
          type: 'flag',
          label: opt.name,
          flagMode: isRadio ? 'radio' : 'tickbox',
          flagValue: (isRadio && i === 0) ? 1 : 0,
          flagBindingId: opt.id,
          flagBindingName: opt.name,
          parentId: catId,
        });
        addChild(catId, flagId);
      });
    });
  }

  // Skip sub-sections of door types (e.g. "DRD DOOR FITTINGS") — gated implicitly
  DOOR_KEYS.forEach(k => {
    placedKeys.add(k + ' DOOR FITTINGS');
  });

  // Remaining sections: category nodes with their flags
  categories.forEach(cat => {
    const key = cat.key;
    if (placedKeys.has(key)) return;
    placedKeys.add(key);

    const catId = addNode({ type: 'category', label: cat.name, sourceCategoryKey: key, parentId: null });
    draft.rootIds.push(catId);

    // Add flags for body options whose group matches this section key
    const opts = optsByGroup[key] || [];
    opts.forEach((opt, i) => {
      const isRadio = opt.selectionMode === 'single';
      const flagId = addNode({
        type: 'flag',
        label: opt.name,
        flagMode: isRadio ? 'radio' : 'tickbox',
        flagValue: (isRadio && i === 0) ? 1 : 0,
        flagBindingId: opt.id,
        flagBindingName: opt.name,
        parentId: catId,
      });
      addChild(catId, flagId);
    });
  });

  draft.nextId = nextId;
  console.log('[generateDefaultDraft] result — rootIds:', draft.rootIds, 'total nodes:', Object.keys(draft.nodes).length);
  draft.rootIds.forEach(rid => {
    const rn = draft.nodes[rid];
    console.log('  ROOT', rid, rn.type, rn.label, 'children:', rn.childIds);
    (rn.childIds || []).forEach(cid => {
      const cn = draft.nodes[cid];
      console.log('    CHILD', cid, cn.type, cn.label, 'children:', cn.childIds);
      (cn.childIds || []).forEach(fid => {
        const fn = draft.nodes[fid];
        console.log('      FLAG', fid, fn.type, fn.label, 'bindingId:', fn.flagBindingId);
      });
    });
  });
  return draft;
}

function lastTrailerStorageKey() {
  return 'visual-body-configurator-last-trailer';
}

function loadLastTrailerId() {
  try {
    const raw = window.localStorage.getItem(lastTrailerStorageKey());
    if (!raw) return null;
    const parsed = Number(raw);
    return Number.isFinite(parsed) ? parsed : null;
  } catch {
    return null;
  }
}

function resolveInitialTrailerId() {
  const availableIds = new Set((BOOT.trailers || []).map(trailer => trailer.id));
  const savedId = loadLastTrailerId();
  if (savedId && availableIds.has(savedId)) return savedId;
  return BOOT.trailers[0] ? BOOT.trailers[0].id : null;
}

function loadDraft(trailerId) {
  try {
    const raw = window.localStorage.getItem(storageKey(trailerId));
    if (!raw) return createEmptyDraft();
    return normalizeDraft(JSON.parse(raw));
  } catch {
    return createEmptyDraft();
  }
}

function persistDraft(trailerId, draft) {
  if (!trailerId) return;
  window.localStorage.setItem(storageKey(trailerId), JSON.stringify(draft));
}

// ── Server-side draft persistence ─────────────────────────────────────────
// The configurator tree is mirrored to the database so the costings page
// applies it for everyone, on any device — not just the browser it was made
// in. localStorage is kept as a local backup / offline fallback.
let _serverSaveTimer = null;
let _pendingServerSave = null;   // { tid, draft }

function saveDraftToServer(trailerId, draft) {
  if (!trailerId) return Promise.resolve();
  return fetch(`/api/configurator/trailers/${trailerId}/draft`, {
    method: 'PUT',
    credentials: 'same-origin',
    keepalive: true,   // survive a page unload so the last edit still lands
    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': _csrfToken() },
    body: JSON.stringify({ draft }),
  }).catch(() => {});
}

// Debounced server mirror — coalesces rapid edits into one PUT.
function scheduleServerSave(trailerId, draft) {
  _pendingServerSave = { tid: trailerId, draft };
  clearTimeout(_serverSaveTimer);
  _serverSaveTimer = setTimeout(flushServerSave, 1000);
}

// Commit any pending save immediately — called on trailer switch (so the
// previous trailer's last edit isn't dropped when the debounce resets) and
// on page unload.
function flushServerSave() {
  clearTimeout(_serverSaveTimer);
  _serverSaveTimer = null;
  const p = _pendingServerSave;
  _pendingServerSave = null;
  if (p) saveDraftToServer(p.tid, p.draft);
}
window.addEventListener('pagehide', flushServerSave);

// One-time sync: pull every server-saved draft into localStorage, and push up
// any browser-only drafts the server doesn't have yet (never clobbering an
// existing server draft). After this, localStorage mirrors the server.
async function bootstrapDrafts() {
  let serverDrafts = {};
  try {
    const r = await fetch('/api/configurator/drafts', { credentials: 'same-origin' });
    if (r.ok) serverDrafts = (await r.json()) || {};
  } catch {}
  const prefix = 'visual-body-configurator-ui:';
  const uploads = [];
  for (let i = 0; i < window.localStorage.length; i++) {
    const key = window.localStorage.key(i);
    if (!key || key.indexOf(prefix) !== 0) continue;
    const tid = Number(key.slice(prefix.length));
    if (!Number.isFinite(tid) || !tid) continue;
    if (serverDrafts[String(tid)]) continue;        // server already has it
    let local;
    try { local = normalizeDraft(JSON.parse(window.localStorage.getItem(key))); }
    catch { continue; }
    if (!local.rootIds.length) continue;            // empty — nothing to migrate
    serverDrafts[String(tid)] = local;
    uploads.push(saveDraftToServer(tid, local));
  }
  await Promise.all(uploads);
  Object.entries(serverDrafts).forEach(([tid, draft]) => {
    try { window.localStorage.setItem(prefix + tid, JSON.stringify(draft)); } catch {}
  });
}

function canHaveChildren(node) {
  return !!node && node.type === 'folder';
}

function nodeTypeLabel(type) {
  if (type === 'folder') return 'Folder';
  if (type === 'category') return 'Category';
  if (type === 'flag') return 'Flag';
  return 'Condition';
}

function nodeDotLabel(type) {
  if (type === 'folder') return 'FD';
  if (type === 'category') return 'CT';
  if (type === 'flag') return 'FG';
  return 'CD';
}

function folderModeLabel(mode) {
  const match = FOLDER_MODES.find(item => item.value === mode);
  return match ? match.label : 'Container';
}

function flagModeLabel(mode) {
  const match = FLAG_MODES.find(item => item.value === mode);
  return match ? match.label : 'Tick box';
}

function normalizeCompare(value) {
  return String(value || '').trim().toUpperCase();
}

function resolveFlagBinding(node, bodyOptions) {
  if (!node || node.type !== 'flag') return '';
  if (node.flagBindingName) return node.flagBindingName;
  const label = normalizeCompare(node.label);
  if (!label) return '';
  const matches = (bodyOptions || []).filter(option => {
    const optionName = normalizeCompare(option.name);
    return optionName === label || optionName.includes(label) || label.includes(optionName);
  });
  return matches.length === 1 ? matches[0].name : '';
}

function buildUsedCategoryMap(draft) {
  const out = {};
  Object.values(draft.nodes).forEach(node => {
    if (node.type === 'category' && node.sourceCategoryKey) {
      out[node.sourceCategoryKey] = node.id;
    }
  });
  return out;
}

function buildBodyOptionLookup(bodyOptions) {
  const byName = new Map();
  (bodyOptions || []).forEach(option => {
    byName.set(option.name, option);
  });
  return byName;
}

function buildNodePath(draft, nodeId) {
  const parts = [];
  let current = draft.nodes[nodeId];
  while (current) {
    parts.unshift(current.label);
    current = current.parentId ? draft.nodes[current.parentId] : null;
  }
  return parts;
}

function itemRuleState(draft, itemId, fallbackItem = null) {
  const key = String(itemId);
  const rule = draft.itemRules && draft.itemRules[key] ? draft.itemRules[key] : null;
  if (!rule) {
    if (fallbackItem) {
      return {
        conditions: Array.isArray(fallbackItem.conditions) ? fallbackItem.conditions : [],
        mode: fallbackItem.conditionMode || 'include',
      };
    }
    return { conditions: [], mode: 'include' };
  }
  return {
    conditions: Array.isArray(rule.conditions) ? rule.conditions : [],
    mode: rule.mode || 'include',
  };
}

function buildActiveRuleNames(draft, bodyOptions) {
  const selected = new Set();
  Object.values(draft.nodes).forEach(node => {
    if (node && node.type === 'flag' && Number(node.flagValue) === 1) {
      const boundName = resolveFlagBinding(node, bodyOptions);
      selected.add(boundName || node.label);
    }
  });
  return selected;
}

function evaluateRule(rule, activeNames) {
  const conditions = Array.isArray(rule.conditions) ? rule.conditions : [];
  const mode = rule.mode || 'include';
  if (mode === 'always_exclude') {
    return { included: false, matched: true };
  }
  if (!conditions.length) {
    return { included: true, matched: true };
  }
  const allMet = conditions.every(condition => {
    const isOn = activeNames.has(condition.option);
    return condition.equals === 'N' ? !isOn : isOn;
  });
  return {
    included: mode === 'exclude' ? !allMet : allMet,
    matched: allMet,
  };
}

// Walk the ancestor chain of a node. If any ancestor folder has a selectable
// mode (radio/tickbox) and its folderValue is 0 (off), the branch is inactive.
function folderBranchActive(draft, nodeId) {
  let current = draft.nodes[nodeId];
  while (current) {
    const parentId = current.parentId;
    if (!parentId) break;
    const parent = draft.nodes[parentId];
    if (!parent) break;
    if (parent.type === 'folder') {
      const mode = parent.folderMode || 'container';
      if ((mode === 'radio' || mode === 'tickbox') && Number(parent.folderValue) !== 1) {
        return false;
      }
    }
    current = parent;
  }
  return true;
}

function ruleSummary(rule) {
  const conditions = Array.isArray(rule.conditions) ? rule.conditions : [];
  const mode = rule.mode || 'include';
  if (mode === 'always_exclude') {
    return { state: 'always_exclude', text: 'Always excluded from costing' };
  }
  if (!conditions.length) {
    return { state: 'always_include', text: 'Always included in costing' };
  }
  return {
    state: mode === 'exclude' ? 'exclude' : 'include',
    text: mode === 'exclude' ? 'Exclude when all conditions match' : 'Include only when all conditions match',
  };
}

function ruleChipText(rule, condition) {
  const prefix = (rule.mode || 'include') === 'exclude' ? 'exclude when' : 'when';
  return `${prefix} ${condition.option} = ${condition.equals}`;
}

function collectScopedRuleOptions(draft, categoryNodeId, bodyOptions) {
  const node = draft.nodes[categoryNodeId];
  if (!node || node.type !== 'category') return [];

  const folderPath = [];
  let currentParentId = node.parentId || null;
  while (currentParentId) {
    const parent = draft.nodes[currentParentId];
    if (!parent) break;
    if (parent.type === 'folder') folderPath.unshift(parent.id);
    currentParentId = parent.parentId || null;
  }

  const seen = new Set();
  const options = [];

  function addOptionFromNode(child, scopeLabel) {
    if (!child || (child.type !== 'flag' && child.type !== 'condition')) return;
    const resolvedValue = child.type === 'flag'
      ? (resolveFlagBinding(child, bodyOptions) || child.label)
      : child.label;
    const key = normalizeCompare(resolvedValue);
    if (!key || seen.has(key)) return;
    seen.add(key);
    const displayLabel = child.type === 'flag' && resolveFlagBinding(child, bodyOptions) && resolveFlagBinding(child, bodyOptions) !== child.label
      ? `${child.label} -> ${resolveFlagBinding(child, bodyOptions)}`
      : child.label;
    options.push({
      label: displayLabel,
      value: resolvedValue,
      type: child.type,
      scope: scopeLabel,
      nodeId: child.id,
    });
  }

  function walkFolderSubtree(folderId, scopeLabel) {
    const folder = draft.nodes[folderId];
    if (!folder) return;
    (folder.childIds || []).forEach(childId => {
      const child = draft.nodes[childId];
      if (!child) return;
      if (child.type === 'folder') {
        walkFolderSubtree(child.id, scopeLabel);
        return;
      }
      if (child.type === 'category') {
        // Flags/conditions that are children of a category inside this folder
        // are in scope for items within that category branch.
        (child.childIds || []).forEach(gcId => {
          addOptionFromNode(draft.nodes[gcId], `${scopeLabel} > ${child.label}`);
        });
        return;
      }
      addOptionFromNode(child, scopeLabel);
    });
  }

  draft.rootIds.forEach(childId => {
    const child = draft.nodes[childId];
    if (child && child.type === 'category') {
      // Root-level category: expose its own child flags at root scope.
      (child.childIds || []).forEach(gcId => {
        addOptionFromNode(draft.nodes[gcId], child.label);
      });
    } else {
      addOptionFromNode(child, 'Root');
    }
  });

  folderPath.forEach(folderId => {
    const folder = draft.nodes[folderId];
    walkFolderSubtree(folderId, folder?.label || 'Folder');
  });

  // Also include flags that are direct children of THIS category node itself.
  (node.childIds || []).forEach(childId => {
    addOptionFromNode(draft.nodes[childId], node.label);
  });

  return options;
}

function nodeDetail(draft, node, bodyOptions) {
  if (node.type === 'folder') {
    return `${folderModeLabel(node.folderMode)} folder - ${node.parentId ? 'inherits parent scope' : 'root scope'}`;
  }
  if (node.type === 'category') {
    return node.parentId
      ? `${folderModeLabel(node.selectionMode)} category inside a folder`
      : 'Reusable body-type category placed at root';
  }
  if (node.type === 'flag') {
    const boundName = resolveFlagBinding(node, bodyOptions);
    return node.parentId
      ? `${flagModeLabel(node.flagMode)} flag inside this folder branch${boundName ? ` -> ${boundName}` : ''}`
      : `${flagModeLabel(node.flagMode)} flag at root scope${boundName ? ` -> ${boundName}` : ''}`;
  }
  return node.parentId
    ? 'Condition applies to categories inside this folder branch'
    : 'Condition applies to all categories in this body type';
}

function canCollapseNode(node) {
  return !!node && (node.type === 'folder' || node.type === 'category');
}

function ItemRuleEditor({ editor, onSave, onClose, saving }) {
  const item = editor?.item;
  const options = editor?.options || [];
  const initialRule = editor?.rule || { conditions: [], mode: 'include' };
  const optionValues = useMemo(() => new Set(options.map(option => option.value)), [options]);
  const missingSavedOptions = useMemo(
    () => (initialRule.conditions || []).filter(condition => !optionValues.has(condition.option)),
    [initialRule.conditions, optionValues],
  );
  const initialMode =
    initialRule.mode === 'always_exclude'
      ? 'always_exclude'
      : (initialRule.conditions || []).length
        ? (initialRule.mode === 'exclude' ? 'exclude_when' : 'include_when')
        : 'always_include';

  const [mode, setMode] = useState(initialMode);
  const [conditions, setConditions] = useState(() => {
    const available = (initialRule.conditions || []).filter(condition => optionValues.has(condition.option));
    return available.length ? available : [...(initialRule.conditions || [])];
  });

  useEffect(() => {
    if (mode !== 'include_when' && mode !== 'exclude_when') return;
    if (!options.length) return;
    setConditions(current => {
      const filtered = current.filter(condition => optionValues.has(condition.option));
      if (filtered.length) return filtered;
      return [{ option: options[0].value, equals: current[0]?.equals || 'Y' }];
    });
  }, [mode, optionValues, options]);

  const pickMode = (nextMode) => {
    setMode(nextMode);
    if (nextMode === 'always_include' || nextMode === 'always_exclude') {
      setConditions([]);
    } else if (!conditions.length && options.length) {
      setConditions([{ option: options[0].value, equals: 'Y' }]);
    }
  };

  const showsRules = mode === 'include_when' || mode === 'exclude_when';
  const submitDisabled = !item || (showsRules && (!options.length || !conditions.length));

  const submit = async () => {
    let nextMode = 'include';
    let nextConditions = [];
    if (mode === 'always_exclude') {
      nextMode = 'always_exclude';
    } else if (mode === 'include_when') {
      nextConditions = conditions;
    } else if (mode === 'exclude_when') {
      nextMode = 'exclude';
      nextConditions = conditions;
    }
    await onSave(item, nextConditions, nextMode);
  };

  return (
    <div className="vs-modal-backdrop" onClick={onClose}>
      <div className="vs-modal vs-rule-modal" onClick={(event) => event.stopPropagation()}>
        <div className="vs-modal-head">
          <h3>Inclusion Rules</h3>
        </div>
        <div className="vs-modal-body vs-rule-modal-body">
          <div className="vs-rule-help">
            <strong>{item?.name}</strong><br />
            Control whether this BOM item appears on the costing by reusing flags and conditions from this category branch.
          </div>

          <div className="vs-rule-mode-list">
            <label className="vs-rule-mode-label">
              <input type="radio" checked={mode === 'always_include'} onChange={() => pickMode('always_include')} />
              <span className="vs-rule-mode-copy">
                <span className="vs-rule-mode-title">Always include in BOM</span>
                <span className="vs-rule-mode-sub">This item is always available on the costing.</span>
              </span>
            </label>
            <label className="vs-rule-mode-label">
              <input type="radio" checked={mode === 'always_exclude'} onChange={() => pickMode('always_exclude')} />
              <span className="vs-rule-mode-copy">
                <span className="vs-rule-mode-title" style={{color:'var(--red)'}}>Always exclude from BOM</span>
                <span className="vs-rule-mode-sub">This item never appears on the costing.</span>
              </span>
            </label>
            <label className="vs-rule-mode-label">
              <input type="radio" checked={mode === 'include_when'} onChange={() => pickMode('include_when')} />
              <span className="vs-rule-mode-copy">
                <span className="vs-rule-mode-title">Only include when...</span>
                <span className="vs-rule-mode-sub">All selected conditions below must be true before the item appears.</span>
              </span>
            </label>
            <label className="vs-rule-mode-label">
              <input type="radio" checked={mode === 'exclude_when'} onChange={() => pickMode('exclude_when')} />
              <span className="vs-rule-mode-copy">
                <span className="vs-rule-mode-title">Don't include when...</span>
                <span className="vs-rule-mode-sub">Hide the item when every condition below is true.</span>
              </span>
            </label>
          </div>

          {showsRules ? (
            options.length ? (
              <div className="vs-rule-scope-list">
                {missingSavedOptions.length ? (
                  <div className="vs-notice" style={{marginBottom:0}}>
                    Saved rule references not found in this explorer branch were removed from the picker. Please remap them to current flags or conditions.
                  </div>
                ) : null}
                {conditions.map((condition, index) => (
                  <div key={index} className="vs-rule-row">
                    <span className="vs-rule-when">{index === 0 ? 'when' : 'and'}</span>
                    <select
                      value={condition.option}
                      onChange={(event) => {
                        const next = [...conditions];
                        next[index] = { ...condition, option: event.target.value };
                        setConditions(next);
                      }}
                    >
                      {options.map(option => (
                        <option key={option.nodeId} value={option.value}>
                          {option.label} ({option.type} / {option.scope})
                        </option>
                      ))}
                    </select>
                    <span className="vs-rule-when">is</span>
                    <select
                      value={condition.equals}
                      onChange={(event) => {
                        const next = [...conditions];
                        next[index] = { ...condition, equals: event.target.value };
                        setConditions(next);
                      }}
                    >
                      <option value="Y">selected</option>
                      <option value="N">not selected</option>
                    </select>
                    <button className="vs-icon-btn" onClick={() => setConditions(conditions.filter((_, i) => i !== index))}>X</button>
                  </div>
                ))}
                <div className="vs-rule-actions" style={{justifyContent:'flex-start'}}>
                  <button
                    className="vs-btn"
                    onClick={() => setConditions([...conditions, { option: options[0].value, equals: 'Y' }])}
                  >
                    Add condition
                  </button>
                </div>
              </div>
            ) : (
              <div className="vs-notice" style={{marginBottom:0}}>
                This category does not currently have any flags or conditions in scope. Add them in the explorer tree first.
              </div>
            )
          ) : null}
        </div>
        <div className="vs-modal-foot">
          <button className="vs-btn" onClick={onClose} disabled={saving}>Cancel</button>
          <button className="vs-btn vs-btn-primary" disabled={submitDisabled || saving} onClick={submit}>
            {saving ? 'Saving...' : 'Save'}
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [trailerId, setTrailerId] = useState(() => resolveInitialTrailerId());
  const [timeline, setTimeline] = useState({ past: [], present: createEmptyDraft(), future: [] });
  const [categories, setCategories] = useState([]);
  const [bodyOptions, setBodyOptions] = useState([]);
  const [activeCatalogKey, setActiveCatalogKey] = useState('');
  const [loadState, setLoadState] = useState('idle');
  const [notice, setNotice] = useState('');
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [collapsed, setCollapsed] = useState({});
  const [selectedId, setSelectedId] = useState(null);
  const [dragPayload, setDragPayload] = useState(null);
  const [hoverTarget, setHoverTarget] = useState('');
  const [dialog, setDialog] = useState(null);
  const [ruleEditor, setRuleEditor] = useState(null);
  const [savingRule, setSavingRule] = useState(false);
  const [showPreview, setShowPreview] = useState(false);
  const [pvCollapsed, setPvCollapsed] = useState({});
  const [snapshotsOpen, setSnapshotsOpen] = useState(false);
  const [snapshotList, setSnapshotList] = useState([]);
  const [snapshotLabel, setSnapshotLabel] = useState('');
  const [snapshotBusy, setSnapshotBusy] = useState(false);
  const catalogRefs = useRef({});
  // True when the current trailer had no saved draft — triggers auto-generate
  // in the categories effect. Reset immediately after generation so a manual
  // clear doesn't re-trigger.
  const freshlyEmptyRef = useRef(false);
  // Gates the draft load/save effects until localStorage has been synced with
  // the server (see the bootstrap effect below).
  const [bootstrapped, setBootstrapped] = useState(false);
  // Skips the server mirror on the persist run that immediately follows a
  // trailer load (that run still carries the previous trailer's draft).
  const skipServerSaveRef = useRef(false);

  const draft = timeline.present;
  const usedCategoryMap = useMemo(() => buildUsedCategoryMap(draft), [draft]);
  const bodyOptionLookup = useMemo(() => buildBodyOptionLookup(bodyOptions), [bodyOptions]);
  const activeRuleNames = useMemo(() => buildActiveRuleNames(draft, bodyOptions), [draft, bodyOptions]);

  // Bootstrap: sync localStorage with the server once, before any draft
  // load/save runs. Fails open — if the server is unreachable the page still
  // works off localStorage.
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try { await bootstrapDrafts(); }
      finally { if (!cancelled) setBootstrapped(true); }
    })();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (!trailerId || !bootstrapped) return;
    flushServerSave();                  // commit the previous trailer's edit
    skipServerSaveRef.current = true;   // the next persist run carries the old draft
    const loaded = loadDraft(trailerId);
    // Track whether this trailer has no saved draft so the categories effect
    // can auto-generate a default tree once the API data arrives.
    freshlyEmptyRef.current = !loaded.rootIds.length;
    setTimeline({ past: [], present: loaded, future: [] });
    setCollapsed({});
    setActiveCatalogKey('');
    setSelectedId(null);
    setRuleEditor(null);
  }, [trailerId, bootstrapped]);

  useEffect(() => {
    if (!trailerId || !bootstrapped) return;
    persistDraft(trailerId, draft);  // localStorage (local backup)
    // Mirror to the server (debounced), except on the load-triggered run.
    if (skipServerSaveRef.current) { skipServerSaveRef.current = false; return; }
    scheduleServerSave(trailerId, draft);
  }, [trailerId, draft, bootstrapped]);

  useEffect(() => {
    if (!trailerId) return;
    try {
      window.localStorage.setItem(lastTrailerStorageKey(), String(trailerId));
    } catch {}
  }, [trailerId]);

  useEffect(() => {
    if (!trailerId || !bootstrapped) return;
    setLoadState('loading');
    setNotice('');
    fetch(`/api/admin/settings/body-types/${trailerId}/categories`, { credentials: 'same-origin' })
      .then(r => r.ok ? r.json() : Promise.reject(`HTTP ${r.status}`))
      .then(data => {
        const cats = data.categories || [];
        const opts = data.bodyOptions || [];
        setCategories(cats);
        setBodyOptions(opts);
        setLoadState('live');
        // Auto-generate a default draft if this trailer had no saved draft.
        if (freshlyEmptyRef.current && cats.length) {
          freshlyEmptyRef.current = false;
          setTimeline({ past: [], present: generateDefaultDraft(cats, opts), future: [] });
        }
      })
      .catch(err => {
        setCategories([]);
        setBodyOptions([]);
        setLoadState('error');
        setNotice(`Failed to load categories for this body type: ${String(err)}`);
      });
  }, [trailerId, bootstrapped]);


  const counts = useMemo(() => {
    const nodes = Object.values(draft.nodes);
    return {
      folders: nodes.filter(node => node.type === 'folder').length,
      categories: nodes.filter(node => node.type === 'category').length,
      flags: nodes.filter(node => node.type === 'flag').length,
      conditions: nodes.filter(node => node.type === 'condition').length,
    };
  }, [draft]);

  const filteredCategories = useMemo(() => {
    const query = search.trim().toLowerCase();
    return categories.filter(category => {
      if (filter === 'selected') return activeCatalogKey && category.key === activeCatalogKey;
      const used = !!usedCategoryMap[category.key];
      if (filter === 'unused' && used) return false;
      if (filter === 'used' && !used) return false;
      if (!query) return true;
      return (category.name || '').toLowerCase().includes(query);
    });
  }, [categories, filter, search, usedCategoryMap, activeCatalogKey]);

  useEffect(() => {
    if (!activeCatalogKey) return;
    if (!categories.some(category => category.key === activeCatalogKey)) {
      setActiveCatalogKey('');
    }
  }, [activeCatalogKey, categories]);

  useEffect(() => {
    if (!selectedId) return;
    const node = draft.nodes[selectedId];
    if (!node || node.type !== 'category' || !node.sourceCategoryKey) return;
    setActiveCatalogKey(node.sourceCategoryKey);
  }, [draft, selectedId]);

  useEffect(() => {
    if (!activeCatalogKey) return;
    const card = catalogRefs.current[activeCatalogKey];
    if (!card) return;
    window.requestAnimationFrame(() => {
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      const toggle = card.querySelector('.vs-catalog-toggle');
      if (toggle) toggle.focus({ preventScroll: true });
    });
  }, [activeCatalogKey, categories, filter, search]);

  function commit(recipe) {
    setTimeline(prev => {
      const previous = clone(prev.present);
      const next = recipe(clone(prev.present));
      return {
        past: [...prev.past.slice(-79), previous],
        present: next,
        future: [],
      };
    });
  }

  function undo() {
    setTimeline(prev => {
      if (!prev.past.length) return prev;
      const nextPresent = clone(prev.past[prev.past.length - 1]);
      return {
        past: prev.past.slice(0, -1),
        present: nextPresent,
        future: [clone(prev.present), ...prev.future],
      };
    });
  }

  function redo() {
    setTimeline(prev => {
      if (!prev.future.length) return prev;
      const [nextPresent, ...rest] = prev.future;
      return {
        past: [...prev.past, clone(prev.present)],
        present: clone(nextPresent),
        future: rest,
      };
    });
  }

  function openCreate(nodeType, parentId) {
    setDialog({
      mode: 'create',
      nodeType,
      parentId,
      label: '',
      folderMode: 'container',
      flagMode: 'tickbox',
      flagBindingName: '',
      flagBindingId: null,
    });
  }

  function openRename(nodeId) {
    const node = draft.nodes[nodeId];
    if (!node || node.type === 'category') return;
    const resolvedBindingName = node.type === 'flag' ? resolveFlagBinding(node, bodyOptions) : '';
    const resolvedBinding = resolvedBindingName ? bodyOptionLookup.get(resolvedBindingName) : null;
    setDialog({
      mode: 'rename',
      nodeType: node.type,
      nodeId,
      parentId: node.parentId || null,
      label: node.label,
      folderMode: node.folderMode || 'container',
      flagMode: node.flagMode || 'tickbox',
      flagBindingName: node.flagBindingName || resolvedBindingName || '',
      flagBindingId: node.flagBindingId || (resolvedBinding ? resolvedBinding.id : null),
    });
  }

  function closeDialog() {
    setDialog(null);
  }

  function submitDialog() {
    if (!dialog) return;
    const label = (dialog.label || '').trim();
    if (!label) return;
    if (dialog.mode === 'create') {
      commit(next => {
        const id = `node-${next.nextId++}`;
        next.nodes[id] = {
          id,
          type: dialog.nodeType,
          label,
          parentId: dialog.parentId || null,
          childIds: [],
          folderMode: dialog.nodeType === 'folder' ? dialog.folderMode : null,
          folderValue: dialog.nodeType === 'folder' ? 0 : 0,
          selectionMode: dialog.nodeType === 'category' ? 'container' : null,
          selectionValue: dialog.nodeType === 'category' ? 0 : 0,
          flagMode: dialog.nodeType === 'flag' ? dialog.flagMode : null,
          flagValue: dialog.nodeType === 'flag' ? 0 : 0,
          flagBindingName: dialog.nodeType === 'flag' ? (dialog.flagBindingName || '') : '',
          flagBindingId: dialog.nodeType === 'flag' ? (dialog.flagBindingId || null) : null,
          sourceCategoryId: null,
          sourceCategoryKey: null,
        };
        if (dialog.parentId) next.nodes[dialog.parentId].childIds.push(id);
        else next.rootIds.push(id);
        return next;
      });
      if (dialog.nodeType === 'folder') {
        setCollapsed(prev => ({ ...prev, [dialog.parentId ? `folder:${dialog.parentId}` : 'root']: false }));
      }
    } else if (dialog.mode === 'rename') {
      commit(next => {
        if (next.nodes[dialog.nodeId]) {
          next.nodes[dialog.nodeId].label = label;
          if (next.nodes[dialog.nodeId].type === 'flag') {
            next.nodes[dialog.nodeId].flagMode = dialog.flagMode || 'tickbox';
            next.nodes[dialog.nodeId].flagBindingName = dialog.flagBindingName || '';
            next.nodes[dialog.nodeId].flagBindingId = dialog.flagBindingId || null;
          }
        }
        return next;
      });
    }
    closeDialog();
  }

  function addCategory(category, parentId) {
    if (!category || usedCategoryMap[category.key]) return;
    commit(next => {
      const id = `node-${next.nextId++}`;
      next.nodes[id] = {
        id,
        type: 'category',
        label: category.name,
        parentId: parentId || null,
        childIds: [],
        folderMode: null,
        selectionMode: 'container',
        selectionValue: 0,
        sourceCategoryId: category.id,
        sourceCategoryKey: category.key,
      };
      if (parentId) next.nodes[parentId].childIds.push(id);
      else next.rootIds.push(id);
      return next;
    });
  }

  function removeNodeRecursive(next, nodeId) {
    const node = next.nodes[nodeId];
    if (!node) return;
    (node.childIds || []).forEach(childId => removeNodeRecursive(next, childId));
    if (node.parentId && next.nodes[node.parentId]) {
      next.nodes[node.parentId].childIds = next.nodes[node.parentId].childIds.filter(id => id !== nodeId);
    } else {
      next.rootIds = next.rootIds.filter(id => id !== nodeId);
    }
    delete next.nodes[nodeId];
  }

  function deleteNode(nodeId) {
    const node = draft.nodes[nodeId];
    if (!node) return;
    const ok = window.confirm(`Delete "${node.label}" and everything inside it?`);
    if (!ok) return;
    commit(next => {
      removeNodeRecursive(next, nodeId);
      return next;
    });
    if (selectedId === nodeId) setSelectedId(null);
  }

  function reorderNode(nodeId, direction) {
    commit(next => {
      const node = next.nodes[nodeId];
      if (!node) return next;
      const list = node.parentId ? next.nodes[node.parentId].childIds : next.rootIds;
      const index = list.indexOf(nodeId);
      const target = index + direction;
      if (index < 0 || target < 0 || target >= list.length) return next;
      const temp = list[index];
      list[index] = list[target];
      list[target] = temp;
      return next;
    });
  }

  function changeFolderMode(nodeId, mode) {
    commit(next => {
      if (next.nodes[nodeId]) next.nodes[nodeId].folderMode = mode;
      return next;
    });
  }

  function changeFolderValue(nodeId, nextValue) {
    commit(next => {
      const node = next.nodes[nodeId];
      if (!node || node.type !== 'folder') return next;
      const normalized = nextValue ? 1 : 0;
      if ((node.folderMode || 'container') === 'radio' && normalized === 1) {
        const siblingIds = node.parentId ? (next.nodes[node.parentId]?.childIds || []) : next.rootIds;
        siblingIds.forEach(siblingId => {
          const sibling = next.nodes[siblingId];
          if (!sibling || sibling.type !== 'folder') return;
          if ((sibling.folderMode || 'container') === 'radio') {
            sibling.folderValue = sibling.id === nodeId ? 1 : 0;
          }
        });
      } else {
        node.folderValue = normalized;
      }
      return next;
    });
  }

  function changeCategoryMode(nodeId, mode) {
    commit(next => {
      if (next.nodes[nodeId]) next.nodes[nodeId].selectionMode = mode;
      return next;
    });
  }

  function changeCategoryValue(nodeId, nextValue) {
    commit(next => {
      const node = next.nodes[nodeId];
      if (!node || node.type !== 'category') return next;
      const normalized = nextValue ? 1 : 0;
      if ((node.selectionMode || 'container') === 'radio' && normalized === 1) {
        const siblingIds = node.parentId ? (next.nodes[node.parentId]?.childIds || []) : next.rootIds;
        siblingIds.forEach(siblingId => {
          const sibling = next.nodes[siblingId];
          if (!sibling || sibling.type !== 'category') return;
          if ((sibling.selectionMode || 'container') === 'radio') {
            sibling.selectionValue = sibling.id === nodeId ? 1 : 0;
          }
        });
      } else {
        node.selectionValue = normalized;
      }
      return next;
    });
  }

  function changeFlagMode(nodeId, mode) {
    commit(next => {
      if (next.nodes[nodeId]) next.nodes[nodeId].flagMode = mode;
      return next;
    });
  }

  function changeFlagValue(nodeId, nextValue) {
    commit(next => {
      const node = next.nodes[nodeId];
      if (!node || node.type !== 'flag') return next;
      const normalized = nextValue ? 1 : 0;
      if ((node.flagMode || 'tickbox') === 'radio' && normalized === 1) {
        const siblingIds = node.parentId ? (next.nodes[node.parentId]?.childIds || []) : next.rootIds;
        siblingIds.forEach(siblingId => {
          const sibling = next.nodes[siblingId];
          if (!sibling || sibling.type !== 'flag') return;
          if ((sibling.flagMode || 'tickbox') === 'radio') {
            sibling.flagValue = sibling.id === nodeId ? 1 : 0;
          }
        });
      } else {
        node.flagValue = normalized;
      }
      return next;
    });
  }

  function moveCategoryNode(nodeId, targetParentId) {
    commit(next => {
      const node = next.nodes[nodeId];
      if (!node || node.type !== 'category') return next;
      const currentParentId = node.parentId || null;
      if (currentParentId === targetParentId) return next;
      if (currentParentId) {
        next.nodes[currentParentId].childIds = next.nodes[currentParentId].childIds.filter(id => id !== nodeId);
      } else {
        next.rootIds = next.rootIds.filter(id => id !== nodeId);
      }
      node.parentId = targetParentId || null;
      if (targetParentId) next.nodes[targetParentId].childIds.push(nodeId);
      else next.rootIds.push(nodeId);
      return next;
    });
  }

  function moveFlagNode(nodeId, targetParentId) {
    commit(next => {
      const node = next.nodes[nodeId];
      if (!node || (node.type !== 'flag' && node.type !== 'condition')) return next;
      const currentParentId = node.parentId || null;
      if (currentParentId === targetParentId) return next;
      if (currentParentId) {
        next.nodes[currentParentId].childIds = next.nodes[currentParentId].childIds.filter(id => id !== nodeId);
      } else {
        next.rootIds = next.rootIds.filter(id => id !== nodeId);
      }
      node.parentId = targetParentId || null;
      if (targetParentId) next.nodes[targetParentId].childIds.push(nodeId);
      else next.rootIds.push(nodeId);
      return next;
    });
  }

  function clearDraft() {
    const ok = window.confirm('Clear the current left-panel layout for this body type?');
    if (!ok) return;
    setTimeline({ past: [], present: createEmptyDraft(), future: [] });
    setCollapsed({});
    setSelectedId(null);
  }

  function collapseAll() {
    const nextCollapsed = {};
    Object.values(draft.nodes).forEach(node => {
      if (canCollapseNode(node)) nextCollapsed[node.id] = true;
    });
    setCollapsed(nextCollapsed);
  }

  function expandAll() {
    setCollapsed({});
  }

  // ── Snapshots (Explorer config backup/restore) ──────────────────────────────
  const currentTrailer = BOOT.trailers.find(t => t.id === trailerId);
  const currentTrailerName = currentTrailer ? currentTrailer.name : '';

  function snapshotDefaultLabel() {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    const today = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    return `${currentTrailerName} ${today}`;
  }

  async function loadSnapshots() {
    if (!trailerId) return;
    try {
      const r = await fetch(`/api/configurator/trailers/${trailerId}/draft-snapshots`,
                            { credentials: 'same-origin' });
      if (r.ok) setSnapshotList(await r.json());
    } catch (_) {}
  }

  function openSnapshots() {
    setSnapshotLabel(snapshotDefaultLabel());
    setSnapshotsOpen(true);
    loadSnapshots();
  }

  async function captureSnapshot() {
    if (!trailerId || snapshotBusy) return;
    setSnapshotBusy(true);
    try {
      const r = await fetch(`/api/configurator/trailers/${trailerId}/draft-snapshots`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json',
                   'X-CSRF-Token': document.querySelector('meta[name=csrf-token]')?.content || '' },
        body: JSON.stringify({ label: snapshotLabel.trim() }),
      });
      if (!r.ok) {
        setNotice('Snapshot capture failed.');
      } else {
        setSnapshotLabel(snapshotDefaultLabel());
        await loadSnapshots();
      }
    } finally {
      setSnapshotBusy(false);
    }
  }

  async function restoreSnapshot(snap) {
    const ok = await window.confirmModal(
      `Restore Explorer config to snapshot "${snap.label}"?\n\n` +
      `Any unsaved changes since this snapshot will be replaced. ` +
      `A safety-net snapshot of the current state will be captured automatically before restoring.`,
      { title: 'Restore snapshot', okText: 'Restore', danger: true }
    );
    if (!ok || snapshotBusy) return;
    setSnapshotBusy(true);
    try {
      const r = await fetch(`/api/configurator/draft-snapshots/${snap.id}/restore`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'X-CSRF-Token': document.querySelector('meta[name=csrf-token]')?.content || '' },
      });
      if (!r.ok) {
        setNotice('Restore failed.');
        return;
      }
      const data = await r.json();
      // Mirror the loaded draft into local state, same path as initial bootstrap
      const restoredRaw = (data && data.draft) ? data.draft : createEmptyDraft();

      // Defensive: strip category nodes whose sourceCategoryKey no longer
      // exists in this trailer's current categories list. Without this, an
      // older snapshot referencing a since-deleted category would render
      // ghost nodes with no items. Keep restore robust — never silently break.
      const knownKeys = new Set(categories.map(c => c.key));
      const orphanLabels = [];
      const nodes = restoredRaw.nodes && typeof restoredRaw.nodes === 'object' ? restoredRaw.nodes : {};
      const orphanIds = new Set();
      Object.entries(nodes).forEach(([nid, n]) => {
        if (!n || n.type !== 'category') return;
        const key = (n.sourceCategoryKey || '').trim().toUpperCase();
        if (!key) return;
        if (!knownKeys.has(key)) {
          orphanIds.add(nid);
          orphanLabels.push(n.label || key);
        }
      });
      let restored = restoredRaw;
      if (orphanIds.size) {
        const cleanedNodes = {};
        Object.entries(nodes).forEach(([nid, n]) => {
          if (orphanIds.has(nid)) return;
          if (n && Array.isArray(n.childIds)) {
            cleanedNodes[nid] = { ...n, childIds: n.childIds.filter(c => !orphanIds.has(c)) };
          } else {
            cleanedNodes[nid] = n;
          }
        });
        const cleanedRoots = Array.isArray(restoredRaw.rootIds)
          ? restoredRaw.rootIds.filter(r => !orphanIds.has(r))
          : [];
        restored = { ...restoredRaw, nodes: cleanedNodes, rootIds: cleanedRoots };
      }

      setTimeline({ past: [], present: { ...createEmptyDraft(), ...restored }, future: [] });
      setCollapsed({});
      setSelectedId(null);
      let msg = `Restored "${snap.label}". A pre-restore safety snapshot was saved.`;
      if (orphanLabels.length) {
        const preview = orphanLabels.slice(0, 5).join(', ');
        const tail = orphanLabels.length > 5 ? `, +${orphanLabels.length - 5} more` : '';
        msg += ` Dropped ${orphanLabels.length} category node${orphanLabels.length===1?'':'s'} no longer present in this body type: ${preview}${tail}.`;
      }
      setNotice(msg);
      await loadSnapshots();
      setSnapshotsOpen(false);
    } finally {
      setSnapshotBusy(false);
    }
  }

  async function deleteSnapshot(snap) {
    const ok = await window.confirmModal(
      `Delete snapshot "${snap.label}"?\nThis cannot be undone.`,
      { title: 'Delete snapshot', okText: 'Delete', danger: true }
    );
    if (!ok || snapshotBusy) return;
    setSnapshotBusy(true);
    try {
      const r = await fetch(`/api/configurator/draft-snapshots/${snap.id}`, {
        method: 'DELETE',
        credentials: 'same-origin',
        headers: { 'X-CSRF-Token': document.querySelector('meta[name=csrf-token]')?.content || '' },
      });
      if (r.ok) await loadSnapshots();
    } finally {
      setSnapshotBusy(false);
    }
  }

  function handleNodeSelect(nodeId) {
    setSelectedId(nodeId);
    const node = draft.nodes[nodeId];
    if (node && node.type === 'category' && node.sourceCategoryKey) {
      setSearch('');
      setFilter('selected');
      setActiveCatalogKey(node.sourceCategoryKey);
    }
  }

  function toggleCatalogCard(categoryKey) {
    setActiveCatalogKey(current => current === categoryKey ? '' : categoryKey);
  }

  function openItemRuleEditor(category, item) {
    const categoryNodeId = usedCategoryMap[category.key];
    const options = categoryNodeId ? collectScopedRuleOptions(draft, categoryNodeId, bodyOptions) : [];
    setRuleEditor({
      categoryKey: category.key,
      categoryName: category.name,
      item,
      categoryNodeId: categoryNodeId || null,
      options,
      rule: itemRuleState(draft, item.id, item),
    });
  }

  async function saveItemRule(item, conditions, mode) {
    setSavingRule(true);
    try {
      const response = await fetch(`/api/configurator/items/${item.id}/conditions`, {
        method: 'PATCH',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRF-Token': document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '',
        },
        body: JSON.stringify({
          conditions,
          mode,
        }),
      });

      let payload = null;
      try {
        payload = await response.json();
      } catch {}

      if (!response.ok) {
        const detail = payload && payload.detail ? payload.detail : `HTTP ${response.status}`;
        throw new Error(detail);
      }

      const savedConditions = Array.isArray(payload?.conditions) ? payload.conditions : conditions;
      const savedMode = payload?.mode || mode;

      commit(next => {
        const key = String(item.id);
        if (savedMode === 'always_exclude') {
          next.itemRules[key] = { mode: 'always_exclude', conditions: [] };
        } else if (!savedConditions.length && savedMode === 'include') {
          delete next.itemRules[key];
        } else {
          next.itemRules[key] = { mode: savedMode, conditions: savedConditions };
        }
        return next;
      });

      setRuleEditor(null);
      setCategories(current => current.map(category => ({
        ...category,
        items: (category.items || []).map(entry => (
          entry.id === item.id
            ? { ...entry, conditions: savedConditions, conditionMode: savedMode }
            : entry
        )),
      })));

      setNotice(`Saved inclusion rules for ${item.name}.`);
    } catch (error) {
      setNotice(`Failed to save inclusion rules for ${item.name}: ${String(error)}`);
    } finally {
      setSavingRule(false);
    }
  }

  function startPaletteDrag(category, event) {
    if (usedCategoryMap[category.key]) return;
    event.dataTransfer.setData('text/plain', category.key);
    setDragPayload({ kind: 'palette-category', category });
  }

  function startTreeCategoryDrag(nodeId, event) {
    const node = draft.nodes[nodeId];
    if (!node || node.type !== 'category') return;
    event.dataTransfer.setData('text/plain', node.label || nodeId);
    setDragPayload({ kind: 'tree-category', nodeId });
  }

  function startTreeFlagDrag(nodeId, event) {
    const node = draft.nodes[nodeId];
    if (!node || (node.type !== 'flag' && node.type !== 'condition')) return;
    event.dataTransfer.setData('text/plain', node.label || nodeId);
    setDragPayload({ kind: 'tree-flag', nodeId });
  }

  function endDrag() {
    setDragPayload(null);
    setHoverTarget('');
  }

  function allowDrop(targetKey, event) {
    if (!dragPayload) return;
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
    setHoverTarget(targetKey);
  }

  function handleDrop(targetParentId) {
    if (!dragPayload) return;
    const payload = dragPayload;
    endDrag();
    if (payload.kind === 'palette-category') {
      addCategory(payload.category, targetParentId || null);
      return;
    }
    if (payload.kind === 'tree-category') {
      moveCategoryNode(payload.nodeId, targetParentId || null);
    }
    if (payload.kind === 'tree-flag') {
      moveFlagNode(payload.nodeId, targetParentId || null);
    }
  }

  function renderNodes(parentId) {
    const childIds = parentId ? draft.nodes[parentId].childIds : draft.rootIds;
    if (!childIds.length) return null;
    return childIds.map((nodeId, index) => {
      const node = draft.nodes[nodeId];
      if (!node) return null;
      const isFolder = node.type === 'folder';
      const isCategory = node.type === 'category';
      const canCollapse = canCollapseNode(node);
      const isCategoryInFolder = node.type === 'category' && !!node.parentId;
      const isSelected = selectedId === nodeId;
      const isCollapsed = !!collapsed[nodeId];
      const siblingIds = parentId ? draft.nodes[parentId].childIds : draft.rootIds;
      const dropKey = isFolder ? `folder:${nodeId}` : '';

      return (
        <div
          key={nodeId}
          className={`vs-node ${node.type} ${isSelected ? 'selected' : ''}`}
          onClick={() => handleNodeSelect(nodeId)}
        >
          <div className="vs-node-row">
            {canCollapse ? (
              <button
                className="vs-node-toggle"
                onClick={(event) => {
                  event.stopPropagation();
                  setCollapsed(prev => ({ ...prev, [nodeId]: !prev[nodeId] }));
                }}
              >
                {isCollapsed ? '+' : '-'}
              </button>
            ) : (
              <span className="vs-node-dot">{nodeDotLabel(node.type)}</span>
            )}

            <div className="vs-node-main">
              <div className="vs-node-head">
                {!isFolder && <span className="vs-node-badge">{nodeTypeLabel(node.type)}</span>}
                {isFolder && <span className="vs-node-dot">{nodeDotLabel(node.type)}</span>}
                <span className="vs-node-title">{node.label}</span>
                {isFolder && <span className="vs-node-badge">{nodeTypeLabel(node.type)}</span>}
              </div>
              {!isCategory || !isCollapsed ? (
                <div className="vs-node-sub">{nodeDetail(draft, node, bodyOptions)}</div>
              ) : null}
            </div>

            <div className="vs-node-actions" onClick={(event) => event.stopPropagation()}>
              {isFolder && (
                <select
                  className="vs-node-mode"
                  value={node.folderMode || 'container'}
                  onChange={(event) => changeFolderMode(nodeId, event.target.value)}
                >
                  {FOLDER_MODES.map(mode => (
                    <option key={mode.value} value={mode.value}>{mode.label}</option>
                  ))}
                </select>
              )}
              {isFolder && (node.folderMode === 'radio' || node.folderMode === 'tickbox') && (
                <button
                  className={`vs-flag-state ${Number(node.folderValue) === 1 ? 'on' : ''}`}
                  title="Folder selected state — all categories inside are included when on"
                  onClick={() => changeFolderValue(nodeId, Number(node.folderValue) === 1 ? 0 : 1)}
                >
                  <span className={`vs-flag-glyph ${node.folderMode}`}>
                    {Number(node.folderValue) === 1 ? '1' : ''}
                  </span>
                  <span>{Number(node.folderValue) === 1 ? '1' : '0'}</span>
                </button>
              )}
              {isCategoryInFolder && (
                <select
                  className="vs-node-mode"
                  value={node.selectionMode || 'container'}
                  title="Category selection mode"
                  onChange={(event) => changeCategoryMode(nodeId, event.target.value)}
                >
                  {FOLDER_MODES.map(mode => (
                    <option key={mode.value} value={mode.value}>{mode.label}</option>
                  ))}
                </select>
              )}
              {isCategoryInFolder && (node.selectionMode === 'radio' || node.selectionMode === 'tickbox') && (
                <button
                  className={`vs-flag-state ${Number(node.selectionValue) === 1 ? 'on' : ''}`}
                  title="Category selected state"
                  onClick={() => changeCategoryValue(nodeId, Number(node.selectionValue) === 1 ? 0 : 1)}
                >
                  <span className={`vs-flag-glyph ${node.selectionMode}`}>
                    {Number(node.selectionValue) === 1 ? '1' : ''}
                  </span>
                  <span>{Number(node.selectionValue) === 1 ? '1' : '0'}</span>
                </button>
              )}
              {node.type === 'flag' && (
                <select
                  className="vs-node-mode"
                  value={node.flagMode || 'tickbox'}
                  title="Flag mode"
                  onChange={(event) => changeFlagMode(nodeId, event.target.value)}
                >
                  {FLAG_MODES.map(mode => (
                    <option key={mode.value} value={mode.value}>{mode.label}</option>
                  ))}
                </select>
              )}
              {node.type === 'flag' && (
                <button
                  className={`vs-flag-state ${Number(node.flagValue) === 1 ? 'on' : ''}`}
                  title="Flag state"
                  onClick={() => changeFlagValue(nodeId, Number(node.flagValue) === 1 ? 0 : 1)}
                >
                  <span className={`vs-flag-glyph ${node.flagMode || 'tickbox'}`}>
                    {Number(node.flagValue) === 1 ? '1' : ''}
                  </span>
                  <span>{Number(node.flagValue) === 1 ? '1' : '0'}</span>
                </button>
              )}
              <div className="vs-node-action-buttons">
                <button className="vs-icon-btn" title="Move up" onClick={() => reorderNode(nodeId, -1)} disabled={index === 0}>Up</button>
                <button className="vs-icon-btn" title="Move down" onClick={() => reorderNode(nodeId, 1)} disabled={index === siblingIds.length - 1}>Dn</button>
                {isFolder && <button className="vs-icon-btn" title="Add folder" onClick={() => openCreate('folder', nodeId)}>+F</button>}
                {isFolder && <button className="vs-icon-btn" title="Add flag" onClick={() => openCreate('flag', nodeId)}>+G</button>}
                {isFolder && <button className="vs-icon-btn" title="Add condition" onClick={() => openCreate('condition', nodeId)}>+C</button>}
                {isCategory && <button className="vs-icon-btn" title="Add flag to this category" onClick={() => openCreate('flag', nodeId)}>+G</button>}
                {node.type !== 'category' && <button className="vs-icon-btn" title="Rename" onClick={() => openRename(nodeId)}>Rn</button>}
                <button className="vs-icon-btn" title="Delete" onClick={() => deleteNode(nodeId)}>X</button>
              </div>
            </div>
          </div>

          {node.type === 'category' && !isCollapsed && (
            <div
              style={{padding:'0 14px 12px 52px'}}
              draggable={true}
              onDragStart={(event) => startTreeCategoryDrag(nodeId, event)}
              onDragEnd={endDrag}
            >
              <div className="vs-folder-drop-copy">Drag this category into another folder or back to root.</div>
            </div>
          )}

          {node.type === 'category' && !isCollapsed && node.childIds.length > 0 && (
            <div className="vs-node-children" style={{paddingLeft: '24px'}}>
              {renderNodes(nodeId)}
            </div>
          )}

          {(node.type === 'flag' || node.type === 'condition') && (
            <div
              style={{padding:'0 14px 8px 52px'}}
              draggable={true}
              onDragStart={(event) => startTreeFlagDrag(nodeId, event)}
